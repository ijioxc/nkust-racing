<title>NKUST Racing — 車體結構解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#f5f5f7;--sf:#fff;
  --ink:#1d1d1f;--ink2:#424245;--ink3:#6e6e73;--ink4:#aeaeb2;
  --b:.5px solid rgba(0,0,0,.09);--bm:.5px solid rgba(0,0,0,.13);
  --red:#ef4444;--eout:cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);border-bottom:var(--bm);z-index:300;position:relative}
.hdr-l{display:flex;align-items:center;gap:10px}
.mark{width:22px;height:22px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.mark span{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:#fff;letter-spacing:-.3px}
.wm{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.sep{color:var(--ink4);margin:0 6px;font-weight:300}
.sub{color:var(--ink3);font-size:12px}
.hdr-c{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.ht{font-size:12px;color:var(--ink3);text-decoration:none;padding:5px 12px;border-radius:6px;transition:background .15s,color .15s}
.ht:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.ht.on{color:var(--ink);font-weight:500;background:rgba(0,0,0,.06)}
.hdr-r{display:flex;gap:6px}
.hb{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--ink2);background:rgba(0,0,0,.05);border:none;cursor:pointer;padding:5px 12px;border-radius:8px;transition:background .15s;text-decoration:none}
.hb:hover{background:rgba(0,0,0,.09)}

/* ── Layout ── */
.app{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── Viewer ── */
.viewer{flex:1;position:relative;background:#e6e6ea;overflow:hidden;min-width:0}
#mount{width:100%;height:100%;position:relative}

/* Loading */
.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#e6e6ea;z-index:20;transition:opacity .5s}
.ring{width:28px;height:28px;border:1.5px solid rgba(0,0,0,.12);border-top-color:var(--ink3);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ink4);text-transform:uppercase}

/* ── Floating Toolbar ── */
.vt{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:3px;background:rgba(255,255,255,.93);backdrop-filter:saturate(180%) blur(16px);border:var(--bm);border-radius:14px;padding:5px 7px;box-shadow:0 2px 12px rgba(0,0,0,.10),0 8px 32px rgba(0,0,0,.07);z-index:100;white-space:nowrap}
.vg{display:flex;align-items:center;gap:1px}
.vs{width:.5px;height:17px;background:rgba(0,0,0,.12);margin:0 3px;flex-shrink:0}
.vb{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.04em;color:var(--ink3);background:transparent;border:none;cursor:pointer;padding:5px 8px;border-radius:7px;transition:color .12s,background .12s;display:flex;align-items:center;gap:4px;user-select:none;white-space:nowrap}
.vb:hover{color:var(--ink);background:rgba(0,0,0,.06)}
.vb.on{color:var(--ink);background:rgba(0,0,0,.08);font-weight:600}
.vb svg{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.vl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:500;letter-spacing:.10em;color:var(--ink4);text-transform:uppercase;flex-shrink:0}
.vv{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);min-width:24px;text-align:right;flex-shrink:0}
.esl{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(0,0,0,.14);outline:none;cursor:pointer;flex-shrink:0}
.esl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.20);transition:transform .15s,background .15s}
.esl:hover::-webkit-slider-thumb{transform:scale(1.2);background:var(--red)}

/* ── Viewport Badges ── */
.ebadge{position:absolute;top:16px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--red);background:rgba(239,68,68,.08);border:.5px solid rgba(239,68,68,.22);padding:4px 10px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .3s}
.ebadge.on{opacity:1}
.pbadge{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border:var(--bm);border-radius:10px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s var(--eout);transform:translateY(-4px);max-width:200px}
.pbadge.on{opacity:1;transform:none}
.pb-s{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);margin-bottom:3px}
.pb-n{font-size:13px;font-weight:600;color:var(--ink)}

/* Hover tooltip */
.tt{position:absolute;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;color:var(--ink);background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border:var(--bm);padding:4px 10px;border-radius:6px;opacity:0;transition:opacity .10s;z-index:50;white-space:nowrap}
.tt.on{opacity:1}

/* ── Side Panel ── */
.panel{width:360px;flex-shrink:0;background:var(--sf);border-left:var(--bm);display:flex;flex-direction:column;overflow:hidden}
.pidle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;gap:16px}
.pidle-i{width:44px;height:44px;border-radius:12px;background:var(--bg);border:var(--bm);display:flex;align-items:center;justify-content:center}
.pidle-i svg{width:20px;height:20px;stroke:var(--ink4);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.pidle-t{font-size:13px;font-weight:500;color:var(--ink2)}
.pidle-b{font-size:12px;color:var(--ink4);line-height:1.65}
.pc{display:none;flex-direction:column;height:100%}
.ph{padding:20px 22px 0;flex-shrink:0}
.psys{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.pnm{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:3px}
.prf{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink4);margin-bottom:14px}
.pbar{height:2px;border-radius:1px;background:var(--red);margin:0 22px 14px;transform-origin:left;animation:barin .4s var(--eout) both}
@keyframes barin{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);border-top:var(--b);border-bottom:var(--b);margin:0 -22px;padding:0 22px}
.tab{padding:9px 0;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--ink4);background:transparent;border:none;cursor:pointer;border-bottom:1.5px solid transparent;transition:color .15s,border-color .15s;position:relative;top:.5px}
.tab:hover{color:var(--ink2)}
.tab.on{color:var(--ink);border-bottom-color:var(--red)}
.pbody{flex:1;overflow-y:auto;padding:20px 22px;scroll-behavior:smooth}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:rgba(0,0,0,.11);border-radius:2px}
.pane{display:none}
.pane.on{display:block;animation:pin .2s var(--eout)}
@keyframes pin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.s{margin-bottom:20px}
.sl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:.5px;background:rgba(0,0,0,.08)}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:.5px solid rgba(0,0,0,.07);gap:12px}
.sr:last-child{border-bottom:none}
.sk{font-size:11.5px;color:var(--ink3);flex-shrink:0}
.sv{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;color:var(--ink);text-align:right}
.note{background:var(--bg);border-left:2px solid rgba(0,0,0,.10);padding:10px 13px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.72;color:var(--ink2)}
.bt{font-size:12.5px;line-height:1.78;color:var(--ink2)}
.bt p{margin-bottom:12px}
.bt p:last-child{margin-bottom:0}
.rules{display:flex;flex-wrap:wrap;gap:5px}
.rule{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;color:var(--ink3);background:var(--bg);border:var(--bm);padding:3px 9px;border-radius:4px}
.rule strong{color:var(--ink);font-weight:600}

@media(max-width:900px){
  html,body{overflow:auto}
  .app{flex-direction:column;overflow:visible}
  .viewer{height:60vw;min-height:280px;flex:none}
  .panel{width:100%;border-left:none;border-top:var(--bm)}
  .hdr-c{display:none}
}
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── Part DB ──────────────────────────────────────────────────────────────────
const PARTS = {
  'main-hoop':{
    system:'Primary Structure', name:'主環', ref:'Main Hoop · FSAE F.5.6.1',
    mfg:{
      specs:[['材料','4130 Chromoly 鋼管'],['管材等級','Size A（最高等級）'],['彎管半徑','≥ 3 × 管外徑'],['焊接工法','TIG 冷焊 + 後退火'],['焊後強度 Sy','180 MPa'],['非焊強度 Sy','305 MPa'],['彈性模數 E','200 GPa']],
      note:'主環是唯一不允許替代材料的管件（F.3.2.1.g）。設計變更須重新提交 SES 審核。',
      rules:['F.3.2.1.g','F.5.6.1','F.3.4.2.a','F.3.4.2.b']},
    concept:{body:'主環位於駕駛軀幹旁，是翻車時保護頭部的核心結構。規則要求主環頂端需高於駕駛頭部 50mm 以上（Driver Template），確保任何翻滾角度下頭部不接觸地面。\n\n設計策略上，主環應盡量靠近車身重心垂直線，減少翻車時偏心力矩。主環必須以結構管三角化接入主結構，不得單獨懸空。',rules:['F.5.6.1','F.5.6.3','F.1.13']},
    physics:{body:'主環主要受力場景為翻車時地面的壓縮衝擊，以及側向撞擊產生的彎矩。在空間框架中，主環相當於一個剛性拱門（Arch）。\n\n拱形結構的抗壓能力主要來自幾何形狀：壓縮力沿拱線傳遞，轉化為管軸方向壓應力，效率遠高於承受彎矩的直樑。\n\n4130 Chromoly Sy = 305 MPa，比 1018 碳鋼高 47%，等效強度下可減薄壁厚約 32%。',rules:['F.3.4.2']},
  },
  'front-hoop':{
    system:'Primary Structure', name:'前環', ref:'Front Hoop · FSAE F.3.2.1.c',
    mfg:{
      specs:[['材料','4130 Chromoly 鋼管'],['管材等級','Size C（可替代）'],['位置','駕駛腿部上方，近方向盤'],['焊接','TIG 全熔透'],['焊後強度 Sy','180 MPa']],
      note:'前環可使用替代管材，但須在 SES 中提交等效截面模數計算（≥ Size C）。',
      rules:['F.3.2.1.c','F.5.6.1','F.5.6.2']},
    concept:{body:'前環與主環共同構成滾籠系統，兩環之間形成保護駕駛的生存區（Survival Cell）。\n\n前環同時是前端結構的垂直支撐點。設計時不得妨礙駕駛視線，且需確保駕駛在 5 秒內能自行脫困（FSAE 逃生測試）。',rules:['F.1.5','F.5.6.1']},
    physics:{body:'前環主要承受前後方向彎矩及垂直壓縮力。幾何剛性不如主環，因此規則強制要求斜撐三角化接入，形成超靜定系統分散應力。\n\n前環與 Side Impact Structure 的接合節點是全車應力集中最高的位置之一。',rules:['F.5.6.2']},
  },
  'side-impact':{
    system:'Safety Structure', name:'側衝擊結構', ref:'Side Impact Structure · FSAE F.3.2.1.e',
    mfg:{
      specs:[['材料','4130 Chromoly 鋼管'],['管材等級','Size B（可替代）'],['配置','兩側各 1 根主管＋斜撐'],['最低高度','距地面 ≤ 300 mm'],['彎管選項','可改用 Size D 管']],
      note:'若使用彎曲或多段管設計，管材需升級至 Size D，且須提交 SES 等效計算。',
      rules:['F.3.2.1.e','F.3.2.1.f']},
    concept:{body:'側衝擊結構是 FSAE 車輛對抗側向碰撞的唯一屏障（無車門）。SIS 高度應覆蓋駕駛腰部至肩部，並與主環、前環節點對齊，確保撞擊力沿結構路徑傳遞至整體框架。\n\n許多隊伍在 SIS 內側加裝 EPS/EPP 泡棉，能顯著降低撞擊加速度峰值。',rules:['F.3.2.1.e']},
    physics:{body:'側向撞擊是短時高衝擊事件。依 F = Δp/Δt，降低受力峰值需延長接觸時間。\n\nSIS 的主要破壞模式為三點彎曲：管件兩端固定於主環與前環節點，撞擊力施加於中央，如同受集中載荷的簡支梁。',rules:['F.4.2.3']},
  },
  'front-bulkhead':{
    system:'Frontal Protection', name:'前隔板', ref:'Front Bulkhead · FSAE F.3.2.1.a',
    mfg:{
      specs:[['材料','4130 Chromoly 鋼管'],['主管等級','Size B'],['支撐管等級','Size C（前隔板支撐）'],['功能','正面撞擊第一道防線'],['允許變形','設計允許適度塑性變形']],
      note:'前隔板後方 Front Bulkhead Support 須以三角形接入主車架形成衝擊盒（Crumple Zone），見 F.3.2.1.a–b。',
      rules:['F.3.2.1.a','F.3.2.1.b']},
    concept:{body:'前隔板定義車輛的「衝擊盒」概念：正面撞擊時允許有控制地塑性變形，吸收動能並保護駕駛艙不被侵入。\n\nFSAE 車重輕（< 300 kg），即便低速撞擊固定障礙，若無吸能設計，傳遞至駕駛的加速度仍可能超過 40g。\n\n多數隊伍在外側安裝 Nose Cone（EPS 鼻錐）以進一步延長撞擊時間。',rules:['F.3.2.1.a']},
    physics:{body:'正面撞擊動能：Ek = ½mv²。以 70 km/h 撞擊固定障礙，車重 200 kg 時動能約 37.9 kJ，全部需由車體結構吸收。\n\n理想吸能力–位移曲線應接近矩形（Plateau Load），在整個壓縮行程維持均勻阻力，使吸能密度最大化。',rules:['F.4.2.2','F.4.2.3']},
  },
  'suspension':{
    system:'Suspension · Kinematics', name:'懸吊接點', ref:'Suspension Pickup · Double Wishbone',
    mfg:{
      specs:[['型式','四輪獨立雙 A 臂'],['接點材料','6061-T6 鋁合金'],['連桿材料','4130 Chromoly 鋼管'],['球頭型式','Rod End（Heim Joint）'],['調整範圍','Camber / Toe / Caster 全可調'],['安全係數','≥ 3.0']],
      note:'所有懸吊接點須能承受設計載荷的 3.0 倍，且接點處管件壁厚需加工後再提交 SES 等效驗算。',
      rules:['T.1','T.2']},
    concept:{body:'雙 A 臂懸吊是 FSAE 的標準選擇，提供最完整的幾何調整自由度：Camber、Toe、Caster 均可獨立調整，讓車隊在比賽日快速針對場地特性優化設定。\n\n懸吊幾何設計核心指標是即時轉向中心（Instant Center）位置，決定側傾中心（Roll Center），影響過彎時輪胎載荷分配。',rules:[]},
    physics:{body:'非彈簧質量（Unsprung Mass）是懸吊設計的核心概念。降低非彈簧質量是懸吊輕量化的首要目標。\n\n彈簧勁度決定系統固有頻率 f = √(k/m)/(2π)，FSAE 通常設定 2–3 Hz。\n\n阻尼比（ζ）控制震動衰減速度，賽車懸吊通常設定 ζ ≈ 0.65–0.75。',rules:[]},
  },
};

// ── Position-based part classifier ───────────────────────────────────────────
function classify(pt, box) {
  const sz = box.getSize(new THREE.Vector3());
  const c  = box.getCenter(new THREE.Vector3());
  const ny = (pt.y - box.min.y) / (sz.y || 1);
  const nz = (pt.z - box.min.z) / (sz.z || 1);
  const rx = Math.abs(pt.x - c.x) / ((sz.x / 2) || 1);
  if (ny > 0.72)                           return 'main-hoop';
  if (ny > 0.52 && nz > 0.55)             return 'front-hoop';
  if (rx > 0.42 && ny > 0.22 && ny < 0.68) return 'side-impact';
  if (nz > 0.72 && ny < 0.60)             return 'front-bulkhead';
  if (ny < 0.22 && rx > 0.22)             return 'suspension';
  return 'main-hoop';
}

// ── Scene ─────────────────────────────────────────────────────────────────────
const mount = document.getElementById('mount');
const W = () => mount.clientWidth, H = () => mount.clientHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe6e6ea);
const camera = new THREE.PerspectiveCamera(44, W() / H(), 0.05, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setSize(W(), H());
Object.assign(renderer.domElement.style, { position: 'absolute', inset: '0' });
mount.appendChild(renderer.domElement);

// ── Lights ────────────────────────────────────────────────────────────────────
const LR = {};
function clrL() { Object.values(LR).forEach(l => scene.remove(l)); Object.keys(LR).forEach(k => delete LR[k]); }

function studio() {
  clrL(); scene.background = new THREE.Color(0xe6e6ea);
  const a = new THREE.AmbientLight(0xffffff, 1.10); scene.add(a); LR.a = a;
  const k = new THREE.DirectionalLight(0xfff5e8, 1.50);
  k.position.set(5, 9, 5); k.castShadow = true; k.shadow.mapSize.setScalar(2048); k.shadow.bias = -.0003;
  scene.add(k); LR.k = k;
  const f = new THREE.DirectionalLight(0xc5dcff, 0.55); f.position.set(-5, 3, -4); scene.add(f); LR.f = f;
  const h = new THREE.HemisphereLight(0xffffff, 0xd6dce8, 0.50); scene.add(h); LR.h = h;
  renderer.toneMappingExposure = 1.05;
}
function dramatic() {
  clrL(); scene.background = new THREE.Color(0x18181e);
  const a = new THREE.AmbientLight(0x111122, 0.18); scene.add(a); LR.a = a;
  const k = new THREE.DirectionalLight(0xfff0cc, 2.80);
  k.position.set(7, 13, 3); k.castShadow = true; k.shadow.mapSize.setScalar(2048); k.shadow.bias = -.0003;
  scene.add(k); LR.k = k;
  const r = new THREE.DirectionalLight(0x3366ff, 0.85); r.position.set(-7, 1, -5); scene.add(r); LR.r = r;
  renderer.toneMappingExposure = 1.20;
}
function flatLight() {
  clrL(); scene.background = new THREE.Color(0xf5f5f7);
  const a = new THREE.AmbientLight(0xffffff, 2.20); scene.add(a); LR.a = a;
  renderer.toneMappingExposure = 0.88;
}
studio();

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(16, 64),
  new THREE.MeshStandardMaterial({ color: 0xd8d8de, roughness: 0.96, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

// ── Materials ─────────────────────────────────────────────────────────────────
const M = {
  normal: new THREE.MeshStandardMaterial({ color: 0xbec8d2, metalness: 0.28, roughness: 0.50 }),
  hover:  new THREE.MeshStandardMaterial({ color: 0xccd8e4, metalness: 0.28, roughness: 0.45, emissive: new THREE.Color(0x7799bb), emissiveIntensity: 0.10 }),
  sel:    new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.28, roughness: 0.38, emissive: new THREE.Color(0xef4444), emissiveIntensity: 0.18 }),
  dim:    new THREE.MeshStandardMaterial({ color: 0xb8c2ca, metalness: 0.25, roughness: 0.55, transparent: true, opacity: 0.26, depthWrite: false }),
  wire:   new THREE.MeshStandardMaterial({ color: 0x334455, wireframe: true }),
  wireS:  new THREE.MeshStandardMaterial({ color: 0xef4444, wireframe: true }),
  xray:   new THREE.MeshStandardMaterial({ color: 0x4488cc, transparent: true, opacity: 0.18, depthWrite: false, side: THREE.DoubleSide }),
  xrayS:  new THREE.MeshStandardMaterial({ color: 0xef4444, transparent: true, opacity: 0.55, depthWrite: false, side: THREE.DoubleSide, emissive: new THREE.Color(0xef4444), emissiveIntensity: 0.28 }),
};
let mode = 'solid', subMeshes = [], selMesh = null, hovMesh = null;
const carBox = new THREE.Box3();

function matFor(m) {
  const s = m === selMesh, h = m === hovMesh;
  if (mode === 'wire') return s ? M.wireS : M.wire;
  if (mode === 'xray') return s ? M.xrayS : M.xray;
  if (s) return M.sel;
  if (h) return M.hover;
  if (selMesh) return M.dim;
  return M.normal;
}
function refresh() { subMeshes.forEach(({ mesh }) => mesh.material = matFor(mesh)); }

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.055;
controls.minPolarAngle = 0.08; controls.maxPolarAngle = Math.PI * 0.87;

// ── Camera animation ──────────────────────────────────────────────────────────
let ca = null; const VIEW = {};
function animCam(p, l, dur = 900) {
  ca = { sp: camera.position.clone(), sl: controls.target.clone(), tp: p.clone(), tl: l.clone(), t0: performance.now(), dur };
}
function goView(n) {
  if (!VIEW[n]) return;
  animCam(VIEW[n].p, VIEW[n].l);
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('on', b.dataset.view === n));
}

// ── Geometry grid-split ───────────────────────────────────────────────────────
// Splits a single-mesh geometry into spatial cells for per-cell explode
function splitGrid(geo, DX, DY, DZ) {
  const pos = geo.attributes.position;
  const norm = geo.attributes.normal;
  const idx = geo.index;
  if (!idx) return [];
  geo.computeBoundingBox();
  const bb = geo.boundingBox;
  const sx = (bb.max.x - bb.min.x) || 1;
  const sy = (bb.max.y - bb.min.y) || 1;
  const sz = (bb.max.z - bb.min.z) || 1;
  const n = idx.count / 3;
  const cells = new Map();
  for (let f = 0; f < n; f++) {
    const i0 = idx.getX(f * 3), i1 = idx.getX(f * 3 + 1), i2 = idx.getX(f * 3 + 2);
    const cx = (pos.getX(i0) + pos.getX(i1) + pos.getX(i2)) / 3;
    const cy = (pos.getY(i0) + pos.getY(i1) + pos.getY(i2)) / 3;
    const cz = (pos.getZ(i0) + pos.getZ(i1) + pos.getZ(i2)) / 3;
    const gx = Math.min(DX - 1, Math.floor((cx - bb.min.x) / sx * DX));
    const gy = Math.min(DY - 1, Math.floor((cy - bb.min.y) / sy * DY));
    const gz = Math.min(DZ - 1, Math.floor((cz - bb.min.z) / sz * DZ));
    const key = gx * DY * DZ + gy * DZ + gz;
    if (!cells.has(key)) cells.set(key, { ix: [], cx: 0, cy: 0, cz: 0, fc: 0 });
    const c = cells.get(key);
    c.ix.push(i0, i1, i2); c.cx += cx; c.cy += cy; c.cz += cz; c.fc++;
  }
  const res = [];
  for (const [, c] of cells) {
    if (c.fc < 2) continue;
    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position', pos);          // shared VBO
    if (norm) sg.setAttribute('normal', norm); // shared
    sg.setIndex(c.ix);
    res.push({ geo: sg, center: new THREE.Vector3(c.cx / c.fc, c.cy / c.fc, c.cz / c.fc) });
  }
  return res;
}

// ── Explode ───────────────────────────────────────────────────────────────────
let eTgt = 0, eCur = 0;
const EMAX = 1.0; // max world-unit offset at 100%
function applyExplode(f) {
  subMeshes.forEach(({ mesh, origPos, dir }) => mesh.position.copy(origPos).addScaledVector(dir, f * EMAX));
}

// ── Raycaster ─────────────────────────────────────────────────────────────────
const rc = new THREE.Raycaster(), mv = new THREE.Vector2();
let mdn = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', e => { mdn = { x: e.clientX, y: e.clientY }; });

renderer.domElement.addEventListener('click', e => {
  if ((e.clientX - mdn.x) ** 2 + (e.clientY - mdn.y) ** 2 > 25) return;
  const r = renderer.domElement.getBoundingClientRect();
  mv.x = ((e.clientX - r.left) / r.width)  * 2 - 1;
  mv.y = -((e.clientY - r.top)  / r.height) * 2 + 1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObjects(subMeshes.map(s => s.mesh), false);
  if (!hits.length) {
    selMesh = null; refresh();
    document.getElementById('pidle').style.display = '';
    document.getElementById('pc').style.display = 'none';
    document.getElementById('pbadge').classList.remove('on');
    return;
  }
  selMesh = hits[0].object; refresh();
  showPart(classify(hits[0].point, carBox));
});

renderer.domElement.addEventListener('mousemove', e => {
  const r = renderer.domElement.getBoundingClientRect();
  mv.x = ((e.clientX - r.left) / r.width)  * 2 - 1;
  mv.y = -((e.clientY - r.top)  / r.height) * 2 + 1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObjects(subMeshes.map(s => s.mesh), false);
  const prev = hovMesh;
  const tt = document.getElementById('tt');
  if (hits.length) {
    hovMesh = hits[0].object;
    renderer.domElement.style.cursor = 'pointer';
    tt.textContent = PARTS[classify(hits[0].point, carBox)]?.name ?? '';
    tt.style.left = (e.clientX - r.left + 14) + 'px';
    tt.style.top  = (e.clientY - r.top  - 22) + 'px';
    tt.classList.add('on');
  } else {
    hovMesh = null;
    renderer.domElement.style.cursor = '';
    tt.classList.remove('on');
  }
  if (prev !== hovMesh) refresh();
});

renderer.domElement.addEventListener('mouseleave', () => {
  hovMesh = null; refresh();
  document.getElementById('tt').classList.remove('on');
});

// ── Load model ────────────────────────────────────────────────────────────────
new GLTFLoader().load('chassis.glb', gltf => {
  const model = gltf.scene;
  let src = null;
  model.traverse(c => { if (c.isMesh) src = c; });
  if (!src) { document.getElementById('ltxt').textContent = '未找到 mesh'; return; }

  document.getElementById('ltxt').textContent = '正規化幾何體…';

  // Normalise: translate to origin, scale to 3.4 units
  const b0 = new THREE.Box3().setFromObject(model);
  const c0 = b0.getCenter(new THREE.Vector3()), s0 = b0.getSize(new THREE.Vector3());
  const sc = 3.4 / Math.max(s0.x, s0.y, s0.z);
  src.geometry.applyMatrix4(
    new THREE.Matrix4()
      .makeTranslation(-c0.x, -c0.y, -c0.z)
      .premultiply(new THREE.Matrix4().makeScale(sc, sc, sc))
  );
  src.position.set(0, 0, 0); src.rotation.set(0, 0, 0); src.scale.set(1, 1, 1);
  if (!src.geometry.attributes.normal) src.geometry.computeVertexNormals();

  // Sit on ground
  const b1 = new THREE.Box3().setFromObject(src);
  src.geometry.applyMatrix4(new THREE.Matrix4().makeTranslation(0, -b1.min.y, 0));
  carBox.setFromObject(src);

  document.getElementById('ltxt').textContent = '切割幾何體…';

  setTimeout(() => {
    const cells = splitGrid(src.geometry, 8, 5, 8);
    const grp = new THREE.Group();
    const carC = carBox.getCenter(new THREE.Vector3());

    cells.forEach(({ geo, center }) => {
      const mesh = new THREE.Mesh(geo, M.normal);
      mesh.castShadow = true; mesh.receiveShadow = true;
      const dir = center.clone().sub(carC);
      if (dir.length() < 0.001) dir.set(0, 1, 0); else dir.normalize();
      // Amplify horizontal spread for better explode visuals
      dir.x *= 1.5; dir.z *= 1.5; dir.normalize();
      subMeshes.push({ mesh, origPos: new THREE.Vector3(0, 0, 0), dir });
      grp.add(mesh);
    });
    scene.add(grp);

    // Camera fit
    const s = carBox.getSize(new THREE.Vector3()), cc = carBox.getCenter(new THREE.Vector3()), d = Math.max(s.x, s.y, s.z);
    VIEW.iso   = { p: new THREE.Vector3(cc.x + d * 0.55, cc.y + d * 0.50, cc.z + d * 0.85), l: cc.clone() };
    VIEW.front = { p: new THREE.Vector3(cc.x,            cc.y + d * 0.10, cc.z + d * 1.70), l: cc.clone() };
    VIEW.side  = { p: new THREE.Vector3(cc.x + d * 1.70, cc.y + d * 0.10, cc.z           ), l: cc.clone() };
    VIEW.top   = { p: new THREE.Vector3(cc.x,            cc.y + d * 2.10, cc.z + 0.01    ), l: cc.clone() };
    camera.position.copy(VIEW.iso.p);
    controls.target.copy(cc);
    controls.minDistance = d * 0.15; controls.maxDistance = d * 7;
    controls.update();

    // Scale-in reveal
    grp.scale.setScalar(0.001);
    const t0 = performance.now();
    (function rev() {
      const p = Math.min((performance.now() - t0) / 700, 1);
      grp.scale.setScalar(1 - Math.pow(1 - p, 3));
      if (p < 1) requestAnimationFrame(rev);
    })();

    document.getElementById('vt').style.display = 'flex';
    const lo = document.getElementById('loading');
    lo.style.opacity = '0';
    setTimeout(() => lo.remove(), 500);
  }, 60);

}, xhr => {
  if (xhr.total) document.getElementById('ltxt').textContent = `載入中 ${Math.round(xhr.loaded / xhr.total * 100)}%`;
}, err => {
  const lo = document.getElementById('loading');
  if (lo) lo.innerHTML = `<div class="ltxt" style="color:#ef4444">載入失敗：${err.message}</div>`;
});

// ── Panel ─────────────────────────────────────────────────────────────────────
function showPart(id) {
  const d = PARTS[id]; if (!d) return;
  document.getElementById('psys').textContent = d.system.toUpperCase();
  document.getElementById('pnm').textContent  = d.name;
  document.getElementById('prf').textContent  = d.ref;
  document.getElementById('pb-s').textContent = d.system;
  document.getElementById('pb-n').textContent = d.name;
  document.getElementById('pbadge').classList.add('on');
  const bar = document.getElementById('pbar');
  bar.style.display = 'block'; bar.style.animation = 'none';
  requestAnimationFrame(() => bar.style.animation = '');
  fMfg(d.mfg); fText('pane-concept', d.concept); fText('pane-physics', d.physics);
  document.getElementById('pidle').style.display = 'none';
  document.getElementById('pc').style.display = 'flex';
  document.querySelectorAll('.tab').forEach(t  => t.classList.toggle('on', t.dataset.tab === 'mfg'));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('on', p.id === 'pane-mfg'));
}

function fMfg(d) {
  let h = '';
  if (d.specs?.length) {
    h += `<div class="s"><div class="sl">規格</div>`;
    h += d.specs.map(([k, v]) => `<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join('');
    h += `</div>`;
  }
  if (d.note) h += `<div class="s"><div class="sl">備注</div><div class="note">${d.note}</div></div>`;
  if (d.rules?.length) {
    h += `<div class="s"><div class="sl">FSAE 條文</div><div class="rules">`;
    h += d.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('');
    h += `</div></div>`;
  }
  document.getElementById('pane-mfg').innerHTML = h;
}
function fText(pid, d) {
  let h = '';
  if (d.body) {
    const ps = d.body.trim().split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    h += `<div class="s"><div class="bt">${ps}</div></div>`;
  }
  if (d.rules?.length) {
    h += `<div class="s"><div class="sl">FSAE 條文</div><div class="rules">`;
    h += d.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('');
    h += `</div></div>`;
  }
  if (!h) h = `<div class="s"><div class="bt"><p style="color:var(--ink4)">—</p></div></div>`;
  document.getElementById(pid).innerHTML = h;
}

document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
  const t = b.dataset.tab;
  document.querySelectorAll('.tab').forEach(x  => x.classList.toggle('on', x === b));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('on', p.id === `pane-${t}`));
}));

// ── Toolbar ───────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => goView(b.dataset.view)));
document.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-mode]').forEach(x => x.classList.toggle('on', x === b));
  mode = b.dataset.mode; refresh();
}));
document.querySelectorAll('[data-light]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-light]').forEach(x => x.classList.toggle('on', x === b));
  const p = b.dataset.light;
  if (p === 'studio') studio(); else if (p === 'dramatic') dramatic(); else flatLight();
}));

const eslEl = document.getElementById('esl'), evEl = document.getElementById('ev');
eslEl.addEventListener('input', () => {
  const v = +eslEl.value;
  eTgt = v / 100; evEl.textContent = v + '%';
  document.getElementById('ebadge').classList.toggle('on', v > 0);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  goView('iso');
  eslEl.value = 0; eTgt = 0; evEl.textContent = '0%';
  document.getElementById('ebadge').classList.remove('on');
});
document.getElementById('btn-shot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = 'NKUST-Racing.png'; a.click();
});

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  if (ca) {
    const t = Math.min((performance.now() - ca.t0) / ca.dur, 1);
    const e = 1 - Math.pow(1 - t, 4);
    camera.position.lerpVectors(ca.sp, ca.tp, e);
    controls.target.lerpVectors(ca.sl, ca.tl, e);
    if (t >= 1) ca = null;
  }
  const pe = eCur; eCur += (eTgt - eCur) * 0.09;
  if (Math.abs(eCur - pe) > 0.0001) applyExplode(eCur);
  controls.update();
  renderer.render(scene, camera);
})();

new ResizeObserver(() => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
}).observe(mount);
</script>
