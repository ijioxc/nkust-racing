<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NKUST Racing — 車體結構解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#f5f5f7;--sf:#fff;
  --ink:#1d1d1f;--ink2:#424245;--ink3:#6e6e73;--ink4:#aeaeb2;
  --b:.5px solid rgba(0,0,0,.09);--bm:.5px solid rgba(0,0,0,.13);
  --red:#ef4444;--eout:cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* Header */
.hdr{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);border-bottom:var(--bm);z-index:300;position:relative}
.hdr-l{display:flex;align-items:center;gap:10px}
.mark{width:22px;height:22px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.mark span{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:#fff;letter-spacing:-.3px}
.wm{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.sep{color:var(--ink4);margin:0 6px;font-weight:300}
.sub{color:var(--ink3);font-size:12px}
.hdr-c{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.ht{font-size:12px;color:var(--ink3);text-decoration:none;padding:5px 12px;border-radius:6px;transition:background .15s,color .15s}
.ht:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.ht.on{color:var(--ink);font-weight:500;background:rgba(0,0,0,.06)}
.hdr-r{display:flex;gap:6px}
.hb{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--ink2);background:rgba(0,0,0,.05);border:none;cursor:pointer;padding:5px 12px;border-radius:8px;transition:background .15s;text-decoration:none}
.hb:hover{background:rgba(0,0,0,.09)}

/* Layout */
.app{display:flex;flex:1;overflow:hidden;min-height:0}

/* Viewer */
.viewer{flex:1;position:relative;background:#e6e6ea;overflow:hidden;min-width:0}
#mount{width:100%;height:100%;position:relative}

/* Loading */
.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#e6e6ea;z-index:20;transition:opacity .5s}
.ring{width:28px;height:28px;border:1.5px solid rgba(0,0,0,.12);border-top-color:var(--ink3);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ink4);text-transform:uppercase}

/* Floating Toolbar */
.vt{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:3px;background:rgba(255,255,255,.93);backdrop-filter:saturate(180%) blur(16px);border:var(--bm);border-radius:14px;padding:5px 7px;box-shadow:0 2px 12px rgba(0,0,0,.10),0 8px 32px rgba(0,0,0,.07);z-index:100;white-space:nowrap}
.vg{display:flex;align-items:center;gap:1px}
.vs{width:.5px;height:17px;background:rgba(0,0,0,.12);margin:0 3px;flex-shrink:0}
.vb{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.04em;color:var(--ink3);background:transparent;border:none;cursor:pointer;padding:5px 8px;border-radius:7px;transition:color .12s,background .12s;display:flex;align-items:center;gap:4px;user-select:none;white-space:nowrap}
.vb:hover{color:var(--ink);background:rgba(0,0,0,.06)}
.vb.on{color:var(--ink);background:rgba(0,0,0,.08);font-weight:600}
.vb svg{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.vl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:500;letter-spacing:.10em;color:var(--ink4);text-transform:uppercase;flex-shrink:0}
.vv{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);min-width:24px;text-align:right;flex-shrink:0}
.esl{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(0,0,0,.14);outline:none;cursor:pointer;flex-shrink:0}
.esl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.20);transition:transform .15s,background .15s}
.esl:hover::-webkit-slider-thumb{transform:scale(1.2);background:var(--red)}

/* Viewport badges */
.ebadge{position:absolute;top:16px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--red);background:rgba(239,68,68,.08);border:.5px solid rgba(239,68,68,.22);padding:4px 10px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .3s}
.ebadge.on{opacity:1}
.pbadge{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border:var(--bm);border-radius:10px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s var(--eout);transform:translateY(-4px);max-width:210px}
.pbadge.on{opacity:1;transform:none}
.pb-g{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pb-s{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4)}
.pb-n{font-size:13px;font-weight:600;color:var(--ink)}

/* Hover tooltip */
.tt{position:absolute;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;color:var(--ink);background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border:var(--bm);padding:4px 10px;border-radius:6px;opacity:0;transition:opacity .10s;z-index:50;white-space:nowrap}
.tt.on{opacity:1}

/* Side Panel */
.panel{width:360px;flex-shrink:0;background:#f0f0f4;border-left:var(--bm);display:flex;flex-direction:column;overflow:hidden}

/* Glass card mixin */
.gc{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border:.5px solid rgba(255,255,255,.88);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.04)}

/* ── Idle Bento ─────────────────────────────────────────────────────────── */
.pidle{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.pidle::-webkit-scrollbar{width:3px}
.pidle::-webkit-scrollbar-thumb{background:rgba(0,0,0,.10);border-radius:2px}

/* Hero card */
.bento-hero{padding:20px 18px 18px;display:flex;flex-direction:column;gap:10px}
.bento-hero-top{display:flex;align-items:center;gap:12px}
.pidle-i{width:38px;height:38px;border-radius:10px;background:rgba(239,68,68,.08);border:.5px solid rgba(239,68,68,.20);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pidle-i svg{width:18px;height:18px;stroke:var(--red);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pidle-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3}
.pidle-b{font-size:11.5px;color:var(--ink3);line-height:1.65}

/* Bento grid for groups */
.bento-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--ink4);padding:0 2px;margin-bottom:2px}
.bento-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bento-group{padding:13px 14px;display:flex;flex-direction:column;gap:5px;cursor:default;transition:transform .15s var(--eout),box-shadow .15s}
.bento-group:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06)}
.bg-swatch{width:20px;height:4px;border-radius:2px;margin-bottom:2px}
.bg-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.2}
.bg-sub{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--ink4);line-height:1.3}

/* ── Part Detail ─────────────────────────────────────────────────────────── */
.pc{display:none;flex-direction:column;height:100%;overflow:hidden}

/* Part header card */
.ph{padding:14px 14px 0;flex-shrink:0}
.ph-card{padding:16px 18px 14px;display:flex;flex-direction:column;gap:6px}
.psys{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--ink4)}
.pnm{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.prf{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--ink4)}
.pbar{height:2px;border-radius:1px;background:var(--red);transform-origin:left;animation:barin .4s var(--eout) both;margin-top:2px}
@keyframes barin{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* Tab bar */
.tabs-wrap{padding:8px 14px 0;flex-shrink:0}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:rgba(0,0,0,.06);border-radius:10px;padding:3px}
.tab{padding:6px 4px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);background:transparent;border:none;cursor:pointer;border-radius:7px;transition:background .15s,color .15s}
.tab:hover{color:var(--ink3)}
.tab.on{background:rgba(255,255,255,.90);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.10)}

/* Scrollable body */
.pbody{flex:1;overflow-y:auto;padding:10px 14px 16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:rgba(0,0,0,.11);border-radius:2px}
.pane{display:none}
.pane.on{display:flex;flex-direction:column;gap:8px;animation:pin .2s var(--eout)}
@keyframes pin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* Spec section */
.s{display:flex;flex-direction:column;gap:0}
.sl{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--ink4);padding:0 2px;margin-bottom:4px}
/* Spec card */
.spec-card{padding:12px 14px}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:.5px solid rgba(0,0,0,.06);gap:12px}
.sr:last-child{border-bottom:none}
.sk{font-size:11px;color:var(--ink3);flex-shrink:0}
.sv{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--ink);text-align:right}

/* Bento 2-col spec grid */
.spec-bento{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spec-cell{padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.spec-cell .sk{font-size:10px;color:var(--ink4)}
.spec-cell .sv{font-size:13px;font-weight:700;color:var(--ink);font-family:'IBM Plex Mono',monospace}

/* Note */
.note{padding:12px 14px;font-size:11.5px;line-height:1.72;color:var(--ink2);border-left:2.5px solid var(--red)}

/* Body text */
.bt{font-size:12px;line-height:1.78;color:var(--ink2)}
.bt p{margin-bottom:10px}
.bt p:last-child{margin-bottom:0}

/* Rules */
.rules{display:flex;flex-wrap:wrap;gap:5px}
.rule{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;color:var(--ink3);background:rgba(0,0,0,.05);border:var(--b);padding:3px 9px;border-radius:5px}
.rule strong{color:var(--red);font-weight:700}

@media(max-width:900px){
  html,body{overflow:auto}
  .app{flex-direction:column;overflow:visible}
  .viewer{height:60vw;min-height:280px;flex:none}
  .panel{width:100%;border-left:none;border-top:var(--bm)}
  .hdr-c{display:none}
}
</style>

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── Component group definitions ───────────────────────────────────────────────
// Each group defines: colour, explode direction, name-matching patterns
// explodeDir = THREE.Vector3 | 'radial' | 'zero'
// When GLB has named meshes, patterns match against mesh/node names.
// When GLB is a single mesh, spatial grid is used and all cells get 'chassis' fallback.
const GROUPS = {
  wheel: {
    label: '輪組', sub: 'Wheels & Tires',
    hex: '#1a1a1a',
    patterns: [/wheel/i, /tire/i, /tyre/i, /rim/i, /brake_rotor/i, /caliper/i],
    explodeDir: 'radial_low',   // outward + slightly down
  },
  rear_wing: {
    label: '後翼', sub: 'Rear Wing',
    hex: '#334a5e',
    patterns: [/rear.*wing/i, /rearwing/i, /back.*wing/i, /wing.*rear/i, /wing.*back/i, /mainplane/i, /endplate.*rear/i],
    explodeDir: new THREE.Vector3(0, 0.6, -1).normalize(),
  },
  front_wing: {
    label: '前端結構', sub: 'Front Bulkhead & Nose',
    hex: '#5a7a5e',
    patterns: [/front.*wing/i, /frontwing/i, /wing.*front/i, /splitter/i, /nose(?:cone)?/i, /endplate.*front/i, /front.*bulkhead/i, /front.*structure/i],
    explodeDir: new THREE.Vector3(0, 0.3, 1).normalize(),
  },
  suspension: {
    label: '懸吊系統', sub: 'Suspension & Uprights',
    hex: '#4a6882',
    patterns: [/suspension/i, /wishbone/i, /a.arm/i, /upright/i, /pushrod/i, /pullrod/i, /rocke[rt]/i, /hub/i],
    explodeDir: 'radial',       // outward from car centre
  },
  bodywork: {
    label: '車殼 / 整流罩', sub: 'Bodywork & Fairings',
    hex: '#c8d4de',
    patterns: [/body/i, /fairing/i, /sidepod/i, /floor/i, /diffuser/i, /undertray/i, /panel/i, /cover/i, /cowl/i],
    explodeDir: new THREE.Vector3(0, 1, 0),
  },
  drivetrain: {
    label: '動力系統', sub: 'Engine & Drivetrain',
    hex: '#8a6030',
    patterns: [/engine/i, /motor/i, /gearbox/i, /differential/i, /exhaust/i, /intake/i, /chain/i, /sprocket/i],
    explodeDir: new THREE.Vector3(0, -0.5, -0.5).normalize(),
  },
  chassis: {
    label: '車架結構', sub: 'Space Frame',
    hex: '#bec8d2',
    patterns: [/chassis/i, /frame/i, /tube/i, /roll.*hoop/i, /main.*hoop/i, /front.*hoop/i, /bulkhead/i, /side.*impact/i],
    explodeDir: 'zero',         // chassis stays in place
  },
};

// Part database (for structural click info)

// ── Group key → Part ID 直接對應（不用點位猜測）────────────────────────────
const GROUP_TO_PART = {
  chassis:    'chassis',
  suspension: 'suspension',
  wheel:      'wheel',
  front_wing: 'front_wing',
  rear_wing:  'rear_wing',
  drivetrain: 'drivetrain',
  bodywork:   'chassis',  // fallback to chassis info
};
function classifyPt(gkey) {
  return GROUP_TO_PART[gkey] ?? 'chassis';
}

// ── Classify mesh/node name → GROUP key ──────────────────────────────────────
function classifyName(name) {
  // Direct match: Blender-split nodes are named exactly like group keys (e.g. wheel_front_L)
  const lower = name.toLowerCase();
  for (const key of Object.keys(GROUPS))
    if (lower === key || lower.startsWith(key + '.') || lower.startsWith(key + '_')) return key;
  // wheel_front_L / wheel_rear_R → wheel group
  if (/^wheel[_.]/.test(lower)) return 'wheel';
  // Pattern match fallback
  for (const [key, g] of Object.entries(GROUPS))
    if (g.patterns.some(p => p.test(name))) return key;
  return 'chassis';
}

// ── Material factory ──────────────────────────────────────────────────────────
function hexToColor(hex) { return new THREE.Color(hex); }
function makeMat(hex, opts = {}) {
  return new THREE.MeshStandardMaterial({ color: hexToColor(hex), metalness: 0.28, roughness: 0.48, ...opts });
}
// Per-group base materials (created after groups are known)
const groupMats = {};
function getGroupMat(gkey) {
  if (!groupMats[gkey]) {
    const g = GROUPS[gkey] || GROUPS.chassis;
    groupMats[gkey] = {
      normal: makeMat(g.hex),
      hover:  makeMat(g.hex, { emissive: hexToColor(g.hex).multiplyScalar(.3), emissiveIntensity: .15 }),
      sel:    makeMat('#ef4444', { emissive: new THREE.Color(0xef4444), emissiveIntensity: .18 }),
      dim:    makeMat(g.hex, { transparent: true, opacity: .22, depthWrite: false }),
      wire:   new THREE.MeshStandardMaterial({ color: hexToColor(g.hex), wireframe: true }),
      wireS:  new THREE.MeshStandardMaterial({ color: 0xef4444, wireframe: true }),
      xray:   new THREE.MeshStandardMaterial({ color: hexToColor(g.hex), transparent: true, opacity: .16, depthWrite: false, side: THREE.DoubleSide }),
      xrayS:  new THREE.MeshStandardMaterial({ color: 0xef4444, transparent: true, opacity: .55, depthWrite: false, side: THREE.DoubleSide, emissive: new THREE.Color(0xef4444), emissiveIntensity: .28 }),
    };
  }
  return groupMats[gkey];
}

function matFor(m) {
  const { mesh, gkey } = m;

  if (h) return mats.hover;

// ── Grid split (single-mesh fallback) ─────────────────────────────────────────
function splitGrid(geo, DX, DY, DZ) {
  const pos = geo.attributes.position, norm = geo.attributes.normal, idx = geo.index;
  if (!idx) return [];
  geo.computeBoundingBox();
  const bb = geo.boundingBox;
  const sx = (bb.max.x - bb.min.x) || 1, sy = (bb.max.y - bb.min.y) || 1, sz = (bb.max.z - bb.min.z) || 1;
  const n = idx.count / 3, cells = new Map();
  for (let f = 0; f < n; f++) {
    const i0 = idx.getX(f*3), i1 = idx.getX(f*3+1), i2 = idx.getX(f*3+2);
    const cx = (pos.getX(i0)+pos.getX(i1)+pos.getX(i2))/3;
    const cy = (pos.getY(i0)+pos.getY(i1)+pos.getY(i2))/3;
    const cz = (pos.getZ(i0)+pos.getZ(i1)+pos.getZ(i2))/3;
    const gx = Math.min(DX-1, Math.floor((cx-bb.min.x)/sx*DX));
    const gy = Math.min(DY-1, Math.floor((cy-bb.min.y)/sy*DY));
    const gz = Math.min(DZ-1, Math.floor((cz-bb.min.z)/sz*DZ));
    const key = gx*DY*DZ + gy*DZ + gz;
    if (!cells.has(key)) cells.set(key, { ix: [], cx: 0, cy: 0, cz: 0, fc: 0 });
    const c = cells.get(key);
    c.ix.push(i0, i1, i2); c.cx += cx; c.cy += cy; c.cz += cz; c.fc++;
  }
  const res = [];
  for (const [, c] of cells) {
    if (c.fc < 2) continue;
    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position', pos); if (norm) sg.setAttribute('normal', norm);
    sg.setIndex(c.ix);
    res.push({ geo: sg, center: new THREE.Vector3(c.cx/c.fc, c.cy/c.fc, c.cz/c.fc) });
  }
  return res;
}

// ── Compute explode direction for a group cell ────────────────────────────────
function computeDir(gkey, center) {
  const g = GROUPS[gkey] || GROUPS.chassis;
  const ed = g.explodeDir;
  if (ed === 'zero') return new THREE.Vector3(0, 0, 0);
  if (ed === 'radial') {
    const d = center.clone().sub(carCenter); d.y = 0;
    return d.length() < .001 ? new THREE.Vector3(1, 0, 0) : d.normalize();
  }
  if (ed === 'radial_low') {
    const d = center.clone().sub(carCenter); d.y = -0.15;
    return d.length() < .001 ? new THREE.Vector3(1, 0, 0) : d.normalize();
  }
  const dir = ed.clone(); dir.x *= 1.4; dir.z *= 1.4; return dir.normalize();
}

// ── Explode ───────────────────────────────────────────────────────────────────
let eTgt = 0, eCur = 0;
const EMAX = 1.1;
function applyExplode(f) {
  subMeshes.forEach(({ mesh, origPos, explodeDir }) =>
    mesh.position.copy(origPos).addScaledVector(explodeDir, f * EMAX)
  );
}

// ── Load model ────────────────────────────────────────────────────────────────
new GLTFLoader().load('chassis_split.glb', gltf => {
  const model = gltf.scene;
  document.getElementById('ltxt').textContent = '分析模型結構…';

  // Collect all meshes from GLB
  const rawMeshes = [];
  model.traverse(c => { if (c.isMesh) rawMeshes.push(c); });
  if (!rawMeshes.length) { document.getElementById('ltxt').textContent = '未找到 mesh'; return; }

  const isMultiMesh = rawMeshes.length > 1;

  // Normalise bounding box to scene origin
  const b0 = new THREE.Box3().setFromObject(model);
  const c0 = b0.getCenter(new THREE.Vector3()), s0 = b0.getSize(new THREE.Vector3());
  const sc = 3.4 / Math.max(s0.x, s0.y, s0.z);

  if (isMultiMesh) {
    // ── Multi-mesh path ─────────────────────────────────────────────────────
    document.getElementById('ltxt').textContent = '組裝元件群組…';
    // Apply global normalisation transform
    model.position.sub(c0); model.scale.setScalar(sc);
    model.updateWorldMatrix(true, true);
    // Sit on ground
    const b1 = new THREE.Box3().setFromObject(model);
    model.position.y -= b1.min.y;
    model.updateWorldMatrix(true, true);
    carBox.setFromObject(model); carCenter.copy(carBox.getCenter(new THREE.Vector3()));
    scene.add(model);

    rawMeshes.forEach(m => {
      m.castShadow = true; m.receiveShadow = true;
      const nodeName = m.name || m.parent?.name || '';
      const gkey = classifyName(nodeName);
      const wc = new THREE.Box3().setFromObject(m).getCenter(new THREE.Vector3());
      const dir = computeDir(gkey, wc);
      m.material = getGroupMat(gkey).normal;
      subMeshes.push({ mesh: m, gkey, origPos: m.position.clone(), explodeDir: dir });
    });
    finishLoad();

  } else {
    // ── Single-mesh path (spatial grid split) ──────────────────────────────
    const src = rawMeshes[0];
    src.geometry.applyMatrix4(
      new THREE.Matrix4().makeTranslation(-c0.x,-c0.y,-c0.z)
        .premultiply(new THREE.Matrix4().makeScale(sc,sc,sc))
    );
    src.position.set(0,0,0); src.rotation.set(0,0,0); src.scale.set(1,1,1);
    if (!src.geometry.attributes.normal) src.geometry.computeVertexNormals();
    const b1 = new THREE.Box3().setFromObject(src);
    src.geometry.applyMatrix4(new THREE.Matrix4().makeTranslation(0,-b1.min.y,0));
    carBox.setFromObject(src); carCenter.copy(carBox.getCenter(new THREE.Vector3()));

    document.getElementById('ltxt').textContent = '切割幾何體…';
    setTimeout(() => {
      const cells = splitGrid(src.geometry, 8, 5, 8);
      const grp = new THREE.Group();
      cells.forEach(({ geo, center }) => {
        const mesh = new THREE.Mesh(geo, getGroupMat('chassis').normal);
        mesh.castShadow = true; mesh.receiveShadow = true;
        const dir = center.clone().sub(carCenter);
        if (dir.length() < .001) dir.set(0,1,0); else dir.normalize();
        dir.x *= 1.5; dir.z *= 1.5; dir.normalize();
        subMeshes.push({ mesh, gkey: 'chassis', origPos: new THREE.Vector3(0,0,0), explodeDir: dir });
        grp.add(mesh);
      });
      scene.add(grp);

      // Reveal
      grp.scale.setScalar(0.001);
      const t0 = performance.now();
      (function rev() {
        const p = Math.min((performance.now()-t0)/700, 1);
        grp.scale.setScalar(1-Math.pow(1-p,3));
        if (p < 1) requestAnimationFrame(rev);
      })();
      finishLoad();
    }, 60);
  }

}, xhr => {
  if (xhr.total) document.getElementById('ltxt').textContent = `載入中 ${Math.round(xhr.loaded/xhr.total*100)}%`;
}, err => {
  const lo = document.getElementById('loading');
  if (lo) lo.innerHTML = `<div class="ltxt" style="color:#ef4444">載入失敗：${err.message}</div>`;
});

// ── Post-load setup ───────────────────────────────────────────────────────────
function finishLoad() {
  // Camera presets
  const s = carBox.getSize(new THREE.Vector3()), cc = carBox.getCenter(new THREE.Vector3()), d = Math.max(s.x,s.y,s.z);
  VIEW.iso   = { p: new THREE.Vector3(cc.x+d*.55, cc.y+d*.50, cc.z+d*.85), l: cc.clone() };
  VIEW.front = { p: new THREE.Vector3(cc.x,       cc.y+d*.10, cc.z+d*1.7 ), l: cc.clone() };
  VIEW.side  = { p: new THREE.Vector3(cc.x+d*1.7, cc.y+d*.10, cc.z       ), l: cc.clone() };
  VIEW.top   = { p: new THREE.Vector3(cc.x,       cc.y+d*2.1, cc.z+.01   ), l: cc.clone() };
  camera.position.copy(VIEW.iso.p);
  controls.target.copy(cc);
  controls.minDistance = d*.15; controls.maxDistance = d*7;
  controls.update();

  buildLegend();

  document.getElementById('vt').style.display = 'flex';
  const lo = document.getElementById('loading'); lo.style.opacity = '0'; setTimeout(() => lo.remove(), 500);
}

// ── Group legend ──────────────────────────────────────────────────────────────
function buildLegend() {
  const presentGroups = [...new Set(subMeshes.map(sm => sm.gkey))];
  const list = document.getElementById('legend-list');
  list.innerHTML = '';
  presentGroups.forEach(gkey => {
    const g = GROUPS[gkey];
    const row = document.createElement('div');
    row.className = 'gc bento-group';
    row.innerHTML = `
      <div class="bg-swatch" style="background:${g.hex}"></div>
      <div class="bg-name">${g.label}</div>
      <div class="bg-sub">${g.sub}</div>`;
    row.addEventListener('click', () => {
      const groupMeshes = subMeshes.filter(sm => sm.gkey === gkey);
      if (groupMeshes.length) { selMesh = groupMeshes[0].mesh; refresh(); }
    });
    list.appendChild(row);
  });
}

// ── Raycaster ─────────────────────────────────────────────────────────────────
const rc = new THREE.Raycaster(), mv = new THREE.Vector2();
let mdn = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', e => { mdn = { x: e.clientX, y: e.clientY }; });

renderer.domElement.addEventListener('click', e => {
  if ((e.clientX-mdn.x)**2+(e.clientY-mdn.y)**2 > 25) return;
  const r = renderer.domElement.getBoundingClientRect();
  mv.x = ((e.clientX-r.left)/r.width)*2-1;
  mv.y = -((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObjects(subMeshes.map(s => s.mesh), false);
  if (!hits.length) {
    selMesh = null; refresh();
    document.getElementById('pidle').style.display = '';
    document.getElementById('pc').style.display = 'none';
    document.getElementById('pbadge').classList.remove('on');
    return;
  }
  const hit = hits[0];
  selMesh = hit.object; refresh();
  const sm = subMeshes.find(s => s.mesh === selMesh);
  const gkey = sm?.gkey ?? 'chassis';
  const partId = classifyPt(gkey);

  // Viewport badge with group colour
  const g = GROUPS[gkey];
  document.getElementById('pb-dot').style.background = g.hex;
  document.getElementById('pb-s').textContent = g.label;
  document.getElementById('pb-n').textContent = PARTS[partId]?.name ?? g.label;
  document.getElementById('pbadge').classList.add('on');

  showPart(partId);
});

renderer.domElement.addEventListener('mousemove', e => {
  const r = renderer.domElement.getBoundingClientRect();
  mv.x = ((e.clientX-r.left)/r.width)*2-1;
  mv.y = -((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObjects(subMeshes.map(s => s.mesh), false);
  const prev = hovMesh;
  const tt = document.getElementById('tt');
  if (hits.length) {
    hovMesh = hits[0].object;
    renderer.domElement.style.cursor = 'pointer';
    const sm = subMeshes.find(s => s.mesh === hovMesh);
    const gkey = sm?.gkey ?? 'chassis';
    const partId = classifyPt(gkey);
    const label = PARTS[partId]?.name ?? GROUPS[gkey]?.label ?? '';
    tt.textContent = label;
    tt.style.left = (e.clientX-r.left+14)+'px';
    tt.style.top  = (e.clientY-r.top-22)+'px';
    tt.classList.add('on');
  } else {
    hovMesh = null; renderer.domElement.style.cursor = '';
    tt.classList.remove('on');
  }
  if (prev !== hovMesh) refresh();
});

renderer.domElement.addEventListener('mouseleave', () => {
  hovMesh = null; refresh();
  document.getElementById('tt').classList.remove('on');
});

// ── Panel ─────────────────────────────────────────────────────────────────────
function showPart(id) {
  const d = PARTS[id]; if (!d) return;
  document.getElementById('psys').textContent = d.system.toUpperCase();
  document.getElementById('pnm').textContent  = d.name;
  document.getElementById('prf').textContent  = d.ref;
  const bar = document.getElementById('pbar');
  bar.style.display = 'block'; bar.style.animation = 'none';
  requestAnimationFrame(() => bar.style.animation = '');
  fMfg(d.mfg); fText('pane-concept', d.concept); fText('pane-physics', d.physics);
  document.getElementById('pidle').style.display = 'none';
  document.getElementById('pc').style.display = 'flex';
  document.querySelectorAll('.tab').forEach(t  => t.classList.toggle('on', t.dataset.tab === 'mfg'));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('on', p.id === 'pane-mfg'));
}
function fMfg(d) {
  let h = '';
  if (d.specs?.length) {
    h += `<div class="sl">規格</div>`;
    // Split into 2-col bento for short values, full-width for long
    const short = d.specs.filter(([,v]) => v.length <= 14);
    const long  = d.specs.filter(([,v]) => v.length  > 14);
    if (short.length >= 2) {
      h += `<div class="spec-bento">` + short.map(([k,v]) => `<div class="gc spec-cell"><div class="sk">${k}</div><div class="sv">${v}</div></div>`).join('') + `</div>`;
    } else {
      long.push(...short);
    }
    if (long.length) {
      h += `<div class="gc spec-card">` + long.map(([k,v]) => `<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join('') + `</div>`;
    }
  }
  if (d.note) h += `<div class="gc note">${d.note}</div>`;
  if (d.rules?.length) {
    h += `<div class="sl">FSAE 條文</div><div class="rules">` + d.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('') + `</div>`;
  }
  document.getElementById('pane-mfg').innerHTML = h;
}
function fText(pid, d) {
  let h = '';
  if (d.body) {
    const ps = d.body.trim().split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    h += `<div class="gc spec-card"><div class="bt">${ps}</div></div>`;
  }
  if (d.rules?.length) {
    h += `<div class="sl">FSAE 條文</div><div class="rules">` + d.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('') + `</div>`;
  }
  if (!h) h = `<div class="gc spec-card"><div class="bt"><p style="color:var(--ink4)">—</p></div></div>`;
  document.getElementById(pid).innerHTML = h;
}
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
  const t = b.dataset.tab;
  document.querySelectorAll('.tab').forEach(x  => x.classList.toggle('on', x === b));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('on', p.id === `pane-${t}`));
}));

// ── Toolbar controls ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-view]').forEach(b  => b.addEventListener('click', () => goView(b.dataset.view)));
document.querySelectorAll('[data-mode]').forEach(b  => b.addEventListener('click', () => {
  document.querySelectorAll('[data-mode]').forEach(x => x.classList.toggle('on', x === b));
  displayMode = b.dataset.mode; refresh();
}));
document.querySelectorAll('[data-light]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-light]').forEach(x => x.classList.toggle('on', x === b));
  const p = b.dataset.light;
  if (p==='studio') studio(); else if (p==='dramatic') dramatic(); else flatLight();
}));
const eslEl = document.getElementById('esl'), evEl = document.getElementById('ev');
eslEl.addEventListener('input', () => {
  const v = +eslEl.value; eTgt = v/100; evEl.textContent = v+'%';
  document.getElementById('ebadge').classList.toggle('on', v > 0);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  goView('iso'); eslEl.value = 0; eTgt = 0; evEl.textContent = '0%';
  document.getElementById('ebadge').classList.remove('on');
});
document.getElementById('btn-shot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = 'NKUST-Racing.png'; a.click();
});

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  if (ca) {
    const t = Math.min((performance.now()-ca.t0)/ca.dur, 1), e = 1-Math.pow(1-t,4);
    camera.position.lerpVectors(ca.sp, ca.tp, e);
    controls.target.lerpVectors(ca.sl, ca.tl, e);
    if (t >= 1) ca = null;
  }
  const pe = eCur; eCur += (eTgt-eCur)*0.09;
  if (Math.abs(eCur-pe) > 0.0001) applyExplode(eCur);
  controls.update(); renderer.render(scene, camera);
})();

new ResizeObserver(() => {
  camera.aspect = W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
}).observe(mount);
</script>
