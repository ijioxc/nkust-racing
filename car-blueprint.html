<style>
/* ── Reset & Tokens ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --bg:       #f5f5f7;
  --surface:  #ffffff;
  --ink:      #1d1d1f;
  --ink-2:    #424245;
  --ink-3:    #6e6e73;
  --ink-4:    #aeaeb2;
  --border:   rgba(0,0,0,0.09);
  --border-md:rgba(0,0,0,0.14);
  --accent:   #0071e3;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --amber:    #d97706;
  --green:    #16a34a;
  --ease:     cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.hdr {
  flex-shrink: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: .5px solid var(--border-md);
  position: relative;
  z-index: 200;
}

.hdr-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hdr-mark {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}
.hdr-mark span {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.3px;
}

.hdr-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -.01em;
}
.hdr-sep {
  color: var(--ink-4);
  margin: 0 2px;
  font-weight: 300;
}
.hdr-sub {
  color: var(--ink-3);
  font-weight: 400;
}

.hdr-nav {
  display: flex;
  align-items: center;
  gap: 2px;
}
.hdr-nav a {
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-3);
  text-decoration: none;
  padding: 5px 12px;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
.hdr-nav a:hover {
  color: var(--ink);
  background: rgba(0,0,0,0.05);
}

/* ── App layout ── */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── 3D Viewer ── */
.viewer {
  flex: 1;
  position: relative;
  background: #f0f0f4;
  overflow: hidden;
}
#three-mount {
  width: 100%;
  height: 100%;
  position: relative;
}

/* Loading */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #f0f0f4;
  z-index: 10;
}
.loading-ring {
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--border-md);
  border-top-color: var(--ink-3);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--ink-4);
  text-transform: uppercase;
}

/* Viewer hint */
.hint {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--ink-3);
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(12px);
  border: .5px solid var(--border-md);
  padding: 5px 14px;
  border-radius: 20px;
  pointer-events: none;
  white-space: nowrap;
}

/* ── Hotspot labels (CSS2D) ── */
.hotspot {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  pointer-events: auto;
  user-select: none;
}
.hs-pip {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ink);
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 0 0 2px rgba(0,0,0,0.18);
  flex-shrink: 0;
  transition: transform .2s var(--ease-out), background .2s;
}
.hotspot:hover .hs-pip,
.hotspot.active .hs-pip {
  transform: scale(1.5);
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.25);
}
.hs-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  color: var(--ink);
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(10px);
  border: .5px solid var(--border-md);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
}
.hotspot:hover .hs-tag,
.hotspot.active .hs-tag {
  background: var(--ink);
  color: #fff;
  border-color: transparent;
}

/* ── Side Panel ── */
.panel {
  width: 360px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: .5px solid var(--border-md);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Empty state */
.panel-idle {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
  gap: 16px;
}
.idle-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--bg);
  border: .5px solid var(--border-md);
  display: flex;
  align-items: center;
  justify-content: center;
}
.idle-icon svg {
  width: 20px;
  height: 20px;
  stroke: var(--ink-4);
  fill: none;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.idle-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
}
.idle-body {
  font-size: 12px;
  color: var(--ink-4);
  line-height: 1.65;
}

/* Panel content */
.panel-content {
  display: none;
  flex-direction: column;
  height: 100%;
}

/* Part header */
.part-hdr {
  padding: 20px 22px 0;
  flex-shrink: 0;
}
.part-system {

.part-name {

}
.part-ref {

  color: var(--ink-4);
  margin-bottom: 16px;

}

.tabs {

  border-top: .5px solid var(--border);
  border-bottom: .5px solid var(--border);
  margin: 0 -22px;
  padding: 0 22px;
}
.tab {

  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-4);

  border: none;

}
.tab:hover { color: var(--ink-2); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); }

/* Panel body */
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px;
  scroll-behavior: smooth;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Section */
.s { margin-bottom: 22px; }
.s-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.s-label::after {
  content: '';
  flex: 1;
  height: .5px;
  background: var(--border);
}

/* Spec table */
.spec-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: .5px solid var(--border);
  gap: 12px;
}
.spec-row:last-child { border-bottom: none; }
.spec-k {
  font-size: 11.5px;
  color: var(--ink-3);
  flex-shrink: 0;
}
.spec-v {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink);
  text-align: right;
}

/* Note block */
.note {
  background: var(--bg);
  border-left: 2px solid var(--border-md);
  padding: 11px 13px;
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-2);
}

/* Body text */
.body-text {
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink-2);
}
.body-text p { margin-bottom: 12px; }
.body-text p:last-child { margin-bottom: 0; }

/* Rule badges */
.rules { display: flex; flex-wrap: wrap; gap: 5px; }
.rule {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: .04em;
  color: var(--ink-3);
  background: var(--bg);
  border: .5px solid var(--border-md);
  padding: 3px 9px;
  border-radius: 4px;
}
.rule strong { color: var(--ink); font-weight: 600; }

/* ── Footer strip ── */
.footer {
  flex-shrink: 0;
  height: 60px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: .5px solid var(--border-md);
  background: var(--surface);
}
.fc {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  border-right: .5px solid var(--border);
}
.fc:last-child { border-right: none; }
.fc-bar {
  width: 2px;
  height: 22px;
  border-radius: 1px;
  flex-shrink: 0;
}
.fc-text {}
.fc-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 2px;
}
.fc-desc {
  font-size: 11px;
  color: var(--ink-2);
}

/* ── Responsive ── */
@media (max-width: 860px) {
  html, body { overflow: auto; }
  .app { flex-direction: column; overflow: visible; }
  .viewer { height: 55vw; min-height: 260px; flex: none; }
  .panel { width: 100%; border-left: none; border-top: .5px solid var(--border-md); }
  .footer { display: none; }
}
</style>

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Part database ───────────────────────────────────────────────────────────
const PARTS = {
  'main-hoop': {
    system: 'Primary Structure',
    name: '主環',
    ref: 'Main Hoop · FSAE F.5.6.1',
    mfg: {
      specs: [
        ['材料', '4130 Chromoly 鋼管'],
        ['管材等級', 'Size A（最高等級）'],
        ['彎管半徑', '≥ 3 × 管外徑'],
        ['焊接工法', 'TIG 冷焊 + 後退火'],
        ['焊後強度 Sy', '180 MPa'],
        ['非焊強度 Sy', '305 MPa'],
        ['彈性模數 E', '200 GPa'],
      ],
      note: '主環是唯一不允許替代材料的管件（F.3.2.1.g）。設計變更須重新提交 SES 審核。',
      rules: ['F.3.2.1.g', 'F.5.2.1', 'F.5.6.1', 'F.3.4.2.a', 'F.3.4.2.b'],
    },
    concept: {
      body: `主環位於駕駛軀幹旁，是翻車時保護頭部的核心結構。規則要求主環頂端需高於駕駛頭部 50mm 以上（套用 Driver Template），確保任何翻滾角度下頭部不接觸地面。

設計策略上，主環應盡量靠近車身重心垂直線，減少翻車時的偏心力矩。主環必須以結構管三角化接入主結構（Triangulated），不得單獨懸空。

此外，主環連同前環之間的空間定義了「Rollover Protection Envelope」，是 FSAE 技術檢查時最優先審核的項目之一。`,
      rules: ['F.5.6.1', 'F.5.6.3', 'F.1.4', 'F.1.13'],
    },
    physics: {
      body: `主環的主要受力場景為翻車時地面的壓縮衝擊，以及側向撞擊產生的彎矩。在空間框架中，主環相當於一個剛性拱門（Arch）。

拱形結構的抗壓能力主要來自幾何形狀而非截面積：壓縮力沿拱線傳遞，轉化為沿管軸方向的壓應力，效率遠高於承受彎矩的直樑。

選用 4130 Chromoly 的關鍵指標：Sy = 305 MPa，比 1018 碳鋼（Sy ≈ 207 MPa）高 47%，因此在等效強度前提下，可將壁厚減薄約 32%，顯著降低車架重量。`,
      rules: ['F.3.4.2'],
    },
  },
  'front-hoop': {
    system: 'Primary Structure',
    name: '前環',
    ref: 'Front Hoop · FSAE F.3.2.1.c',
    mfg: {
      specs: [
        ['材料', '4130 Chromoly 鋼管'],
        ['管材等級', 'Size C（可使用替代材料）'],
        ['位置', '駕駛腿部上方，近方向盤'],
        ['焊接', 'TIG 焊接，節點全熔透'],
        ['焊後強度 Sy', '180 MPa'],
      ],
      note: '前環可使用替代管材，但須在 SES 中提交等效截面模數計算（Section Modulus ≥ Size C 規定值）。',
      rules: ['F.3.2.1.c', 'F.5.6.1', 'F.5.6.2'],
    },
    concept: {
      body: `前環與主環共同構成滾籠系統，兩環之間的空間形成保護駕駛的生存區（Survival Cell）。翻車時，前後兩個接地點與滾籠形成三點支撐，分散衝擊力。

前環同時是前端結構的垂直支撐點，協助吸收正面撞擊能量。設計時前環不得妨礙駕駛視線，且需確保駕駛在 5 秒內能自行脫困（FSAE 逃生測試要求）。`,
      rules: ['F.1.5', 'F.5.6.1'],
    },
    physics: {
      body: `前環的受力模式與主環不同：主要承受前後方向彎矩（翻車時前方接地）以及垂直壓縮力。

前環較矮且靠前，幾何剛性不如主環，因此規則強制要求以斜撐（Bracing）三角化接入主結構，形成超靜定（Hyperstatic）系統分散應力，避免任何單一節點承受全部載荷。

前環與 Side Impact Structure 的接合節點是全車應力集中最高的位置之一，焊道品質直接決定此節點的安全性。`,
      rules: ['F.5.6.2', 'F.3.2.1.d'],
    },
  },
  'side-impact': {
    system: 'Safety Structure',
    name: '側衝擊結構',
    ref: 'Side Impact Structure · FSAE F.3.2.1.e',
    mfg: {
      specs: [
        ['材料', '4130 Chromoly 鋼管'],
        ['管材等級', 'Size B（可使用替代材料）'],
        ['配置', '兩側各 1 根主管 + 斜撐'],
        ['最低高度', '距地面 ≤ 300mm'],
        ['彎管選項', '可改用 Size D 管（F.3.2.1.f）'],
      ],
      note: '若使用彎曲或多段管設計（Bent / Multi Upper），管材需升級至 Size D，且須提交 SES 等效計算。',
      rules: ['F.3.2.1.e', 'F.3.2.1.f'],
    },
    concept: {
      body: `側衝擊結構是 FSAE 車輛對抗側向碰撞的唯一屏障，因為沒有車門。其有效性直接決定駕駛在側碰事故中的安全性。

設計上，SIS 高度應覆蓋駕駛腰部至肩部範圍，並與主環、前環節點對齊，確保撞擊力能沿結構路徑傳遞至整體框架。

許多隊伍在 SIS 內側加裝 EPS / EPP 泡棉吸能材料，雖然規則未強制要求，但能顯著降低撞擊加速度峰值，提升實際安全性。`,
      rules: ['F.3.2.1.e', 'F.3.2.1.f'],
    },
    physics: {
      body: `側向撞擊是短時高衝擊（High-Impulse）事件。依衝量-動量定理 F = Δp / Δt，要降低受力峰值，需延長接觸時間——即以吸能材料增大 Δt。

SIS 的主要破壞模式為三點彎曲（Three-Point Bending）：管件兩端固定於主環與前環節點，撞擊力施加於中央，如同受集中載荷的簡支梁。

Size B 管材的截面模數（Z = I/c）是 FSAE 設定的抗彎下限，對應特定能量吸收量。等效替代材料的截面模數不得低於此值。`,
      rules: ['F.4.2.3'],
    },
  },
  'front-bulkhead': {
    system: 'Frontal Protection',
    name: '前隔板',
    ref: 'Front Bulkhead · FSAE F.3.2.1.a',
    mfg: {
      specs: [
        ['材料', '4130 Chromoly 鋼管'],
        ['主管等級', 'Size B'],
        ['支撐管等級', 'Size C（Front Bulkhead Support）'],
        ['功能', '正面撞擊第一道防線'],
        ['允許變形', '設計允許適度塑性變形'],
      ],
      note: '前隔板後方的 Front Bulkhead Support 須以三角形接入主車架，形成衝擊盒（Crumple Zone）區域，規範見 F.3.2.1.a–b。',
      rules: ['F.3.2.1.a', 'F.3.2.1.b'],
    },
    concept: {
      body: `前隔板定義了車輛的「衝擊盒」概念：正面撞擊時，前隔板及支撐結構允許有控制地塑性變形，吸收動能並保護駕駛艙不被侵入。

FSAE 車重輕（< 300 kg），即便低速撞擊固定障礙，若無吸能設計，傳遞至駕駛的加速度仍可能超過 40g 安全上限。

實務上多數隊伍在前隔板外側安裝 Nose Cone（EPS 泡棉鼻錐），進一步延長撞擊時間、降低力峰值，且 Nose Cone 本身無結構規範，可自由優化形狀。`,
      rules: ['F.3.2.1.a', 'F.3.2.1.b'],
    },
    physics: {
      body: `正面撞擊動能：Ek = ½mv²。以 70 km/h 撞擊固定障礙，車重 200 kg 時，動能約 37.9 kJ，全部需由車體結構及吸能材料吸收。

理想的吸能力-位移曲線應接近矩形（Plateau Load），即在整個壓縮行程中維持均勻阻力，使吸能密度最大化，同時避免力峰值過高傷及駕駛。

三角化的前隔板支撐結構建立多條載荷傳遞路徑（Load Path），使衝擊力分散到整個主結構而非集中在單點，避免局部應力集中造成提前失效。`,
      rules: ['F.4.2.2', 'F.4.2.3'],
    },
  },
  'suspension': {
    system: 'Suspension · Kinematics',
    name: '懸吊接點',
    ref: 'Suspension Pickup · Double Wishbone',
    mfg: {
      specs: [
        ['型式', '四輪獨立雙 A 臂'],
        ['接點材料', '6061-T6 鋁合金'],
        ['連桿材料', '4130 Chromoly 鋼管'],
        ['球頭型式', 'Rod End（Heim Joint）'],
        ['調整範圍', 'Camber / Toe / Caster 全可調'],
        ['安全係數', '≥ 3.0（設計載荷基礎）'],
      ],
      note: '所有懸吊接點須能承受設計載荷的 3.0 倍，且接點處的管件壁厚需加工後再提交 SES 等效驗算。',
      rules: ['T.1', 'T.2'],
    },
    concept: {
      body: `雙 A 臂懸吊是 FSAE 的標準選擇，因為它提供最完整的幾何調整自由度：外傾角（Camber）、束角（Toe）、主銷後傾角（Caster）均可獨立調整，讓車隊能在比賽日快速針對場地特性優化設定。

懸吊幾何設計的核心指標是即時轉向中心（Instant Center）位置。IC 高度決定側傾中心（Roll Center），進而影響過彎時的輪胎載荷分配與外傾角變化曲線。

FSAE 多數車隊採用接近零側傾設計，目的是讓外側輪胎在過彎時保持最大接地面積，最大化摩擦圓利用率。`,
      rules: [],
    },
    physics: {
      body: `非彈簧質量（Unsprung Mass）是懸吊設計的核心物理概念。車輪、煞車、輪轂等無法被彈簧隔離的質量，每次遇到路面不平時須加速，消耗能量並將衝擊傳入底盤。降低非彈簧質量是懸吊輕量化設計的首要目標。

彈簧勁度（Spring Rate）決定系統固有頻率 f = √(k/m)/(2π)。FSAE 車輛通常設定前後固有頻率在 2–3 Hz，避免與路面激振產生共振，同時提供足夠的行程吸收衝擊。

阻尼比（Damping Ratio ζ）控制震動衰減速度。臨界阻尼（ζ = 1）衰減最快但偏硬，實務上賽車懸吊通常設定 ζ ≈ 0.65–0.75，在舒適度與響應速度間取得平衡。`,
      rules: [],
    },
  },
};

// ─── Three.js ────────────────────────────────────────────────────────────────
const mount = document.getElementById('three-mount');
const W = () => mount.clientWidth;
const H = () => mount.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f4);

const camera = new THREE.PerspectiveCamera(46, W() / H(), 0.05, 500);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(W(), H());
Object.assign(renderer.domElement.style, { position: 'absolute', inset: '0' });
mount.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(W(), H());
Object.assign(labelRenderer.domElement.style, { position: 'absolute', inset: '0', pointerEvents: 'none' });
mount.appendChild(labelRenderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 0.75);
sun.position.set(6, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(2048);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xcce0ff, 0.35);
fill.position.set(-6, 4, -4);
scene.add(fill);
scene.add(new THREE.HemisphereLight(0xffffff, 0xdedee8, 0.45));

// Ground
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(12, 64),
  new THREE.MeshStandardMaterial({ color: 0xe8e8ed, roughness: 0.95, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minPolarAngle = 0.1;
controls.maxPolarAngle = Math.PI * 0.85;

// ─── Load model ──────────────────────────────────────────────────────────────
new GLTFLoader().load('chassis.glb', gltf => {
  const model = gltf.scene;

  // Normalise
  const box = new THREE.Box3().setFromObject(model);
  const cen = box.getCenter(new THREE.Vector3());
  const siz = box.getSize(new THREE.Vector3());
  const sc  = 3.4 / Math.max(siz.x, siz.y, siz.z);
  model.position.copy(cen.negate().multiplyScalar(sc));
  model.scale.setScalar(sc);

  // Sit on ground
  const b2 = new THREE.Box3().setFromObject(model);
  model.position.y -= b2.min.y;

  // Material — dark metallic steel
  const mat = new THREE.MeshStandardMaterial({ color: 0x22375a, metalness: 0.58, roughness: 0.42 });
  model.traverse(c => {
    if (!c.isMesh) return;
    c.castShadow = true;
    c.receiveShadow = true;
    c.material = mat;
  });
  scene.add(model);

  // Camera fit
  const b3 = new THREE.Box3().setFromObject(model);
  const s3 = b3.getSize(new THREE.Vector3());
  const c3 = b3.getCenter(new THREE.Vector3());
  const d  = Math.max(s3.x, s3.y, s3.z) * 1.65;
  camera.position.set(c3.x + d * 0.52, c3.y + d * 0.42, c3.z + d * 0.78);
  controls.target.copy(c3);
  controls.minDistance = d * 0.2;
  controls.maxDistance = d * 5;
  controls.update();

  // Scale-in
  model.scale.setScalar(0.001);
  const t0 = performance.now();
  (function reveal() {
    const p = Math.min((performance.now() - t0) / 700, 1);
    model.scale.setScalar((1 - Math.pow(1 - p, 3)) * sc);
    if (p < 1) requestAnimationFrame(reveal);
  })();

  // Hotspots (built after scale-in)
  setTimeout(() => buildHotspots(b3, c3, s3), 650);

  // Dismiss loader
  const el = document.getElementById('loading');
  el.style.transition = 'opacity .5s';
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 500);

}, undefined, err => {
  document.getElementById('loading').innerHTML =
    `<div class="loading-text" style="color:#ef4444">載入失敗：${err.message}</div>`;
});

// ─── Hotspots ─────────────────────────────────────────────────────────────────
let hotspots = [];

function buildHotspots(box, cen, siz) {
  const { min, max } = box;
  const midY = (min.y + max.y) / 2;

  const defs = [
    { id: 'main-hoop',      pos: new THREE.Vector3(cen.x,        max.y,              cen.z) },
    { id: 'front-hoop',     pos: new THREE.Vector3(cen.x,        max.y * 0.76,       max.z * 0.52) },
    { id: 'side-impact',    pos: new THREE.Vector3(min.x * 0.82, midY,               cen.z) },
    { id: 'front-bulkhead', pos: new THREE.Vector3(cen.x,        midY,               max.z * 0.88) },
    { id: 'suspension',     pos: new THREE.Vector3(min.x * 0.82, min.y + siz.y*0.12, max.z * 0.48) },
  ];

  defs.forEach(({ id, pos }) => {
    const d = PARTS[id];
    const div = document.createElement('div');
    div.className = 'hotspot';
    div.innerHTML = `<div class="hs-pip"></div><div class="hs-tag">${d.name}</div>`;
    div.addEventListener('click', e => { e.stopPropagation(); select(id, div); });
    const obj = new CSS2DObject(div);
    obj.position.copy(pos);
    scene.add(obj);
    hotspots.push({ id, el: div });
  });
}

// ─── Selection ───────────────────────────────────────────────────────────────
let active = null;

function select(id, el) {
  active = id;
  hotspots.forEach(h => h.el.classList.toggle('active', h.el === el));

  const d = PARTS[id];
  document.getElementById('part-system').textContent = d.system.toUpperCase();
  document.getElementById('part-name').textContent = d.name;
  document.getElementById('part-ref').textContent = d.ref;

  fillMfg(d.mfg);
  fillText('pane-concept', d.concept);
  fillText('pane-physics', d.physics);

  document.getElementById('panel-idle').style.display = 'none';
  const pc = document.getElementById('panel-content');
  pc.style.display = 'flex';

  // Reset tab to mfg
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'mfg'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-mfg'));
}

function fillMfg(data) {
  let h = '';
  if (data.specs?.length) {
    h += `<div class="s"><div class="s-label">規格</div>`;
    h += data.specs.map(([k, v]) =>
      `<div class="spec-row"><span class="spec-k">${k}</span><span class="spec-v">${v}</span></div>`
    ).join('');
    h += `</div>`;
  }
  if (data.note) {
    h += `<div class="s"><div class="s-label">備注</div><div class="note">${data.note}</div></div>`;
  }
  if (data.rules?.length) {
    h += `<div class="s"><div class="s-label">FSAE 條文</div><div class="rules">`;
    h += data.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('');
    h += `</div></div>`;
  }
  document.getElementById('pane-mfg').innerHTML = h;
}

function fillText(paneId, data) {
  let h = '';
  if (data.body) {
    const paras = data.body.trim().split('\n\n')
      .map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');
    h += `<div class="s"><div class="body-text">${paras}</div></div>`;
  }
  if (data.rules?.length) {
    h += `<div class="s"><div class="s-label">FSAE 條文</div><div class="rules">`;
    h += data.rules.map(r => `<span class="rule">FSAE <strong>${r}</strong></span>`).join('');
    h += `</div></div>`;
  }
  if (!h) h = `<div class="s"><div class="body-text"><p style="color:var(--ink-4)">—</p></div></div>`;
  document.getElementById(paneId).innerHTML = h;
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `pane-${t}`));
  });
});

// ─── Render loop ─────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
})();

// ─── Resize ──────────────────────────────────────────────────────────────────
new ResizeObserver(() => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
  labelRenderer.setSize(W(), H());
}).observe(mount);
</script>
</body>
</html>
