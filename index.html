<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NKUST Racing — 統一網頁視覺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="themes.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--page-bg);
    background-image: var(--page-gradient, none);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
  }
  #root { isolation: isolate; }
</style>

<!-- Three.js ES-module imports (used by Blueprint3D.js) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="root"></div>

<!-- Three.js scene manager — must load before React mounts Blueprint -->
<script type="module" src="Blueprint3D.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Firebase Realtime Database (compat SDK — exposes global `firebase`) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="firebase-store.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="Modal.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Boards.jsx"></script>
<script type="text/babel" src="Blueprint.jsx"></script>
<script type="text/babel" src="EssayWidgets.jsx"></script>
<script type="text/babel" src="Essay.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
