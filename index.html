<!-- Pre-paint appearance resolver — sets data-appearance before first paint (no FOUC) -->
<script>
  (function () {
    try {
      var pref = localStorage.getItem("appearance") || "auto";
      var dark = pref === "dark" || (pref === "auto" &&
        window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-appearance", dark ? "dark" : "light");
    } catch (e) {
      document.documentElement.setAttribute("data-appearance", "light");
    }
  })();
</script>
<link rel="stylesheet" href="tokens.css?v=25">
<link rel="stylesheet" href="themes.css?v=25">
<style>
  html, body { margin: 0; }
  body {
    background: var(--page-bg);
    background-image: var(--page-gradient, none);
    background-attachment: fixed;
    color: var(--label-primary);
    min-height: 100vh;
    /* WWDC 2025: view-transition-name on root for page-level spring animations */
    view-transition-name: root;
  }
  #root { isolation: isolate; }

  /* Suppress view-transition flicker on reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    ::view-transition-old(root),
    ::view-transition-new(root) { animation: none; }
  }
</style>

<!-- 全域診斷錯誤面板 -->
<div id="diagnostic-error-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 999999; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <div style="background: rgba(30, 30, 35, 0.9); border: 1px solid rgba(255, 107, 107, 0.4); border-radius: 16px; padding: 32px; max-width: 650px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.6); color: #fff;">
    <h3 style="margin-top: 0; color: #ff6b6b; font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px;">
      <svg style="width: 26px; height: 26px; fill: currentColor;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      系統啟動錯誤診斷
    </h3>
    <p style="color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.6; margin-bottom: 20px;">
      網頁在啟動或動態編譯過程中發生了致命錯誤。這通常是快取污染、語法錯誤或跨網域資源載入失敗所致。
    </p>
    <div id="diagnostic-error-msg" style="background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 18px; font-family: 'Fira Code', Consolas, Monaco, monospace; font-size: 12.5px; color: #ff8787; overflow-x: auto; white-space: pre-wrap; max-height: 280px; line-height: 1.5; box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);"></div>
    <div style="margin-top: 28px; display: flex; gap: 14px; flex-wrap: wrap;">
      <button onclick="location.reload(true)" style="background: linear-gradient(135deg, #ff6b6b, #ee5253); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 12px rgba(255,107,107,0.3);" onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 16px rgba(255,107,107,0.4)'" onmouseout="this.style.transform='none'; this.style.boxShadow='0 4px 12px rgba(255,107,107,0.3)'">
        強制重新整理
      </button>
      <button onclick="navigator.serviceWorker.getRegistrations().then(rs => { for(let r of rs) r.unregister(); caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => location.reload(true)); })" style="background: rgba(255, 255, 255, 0.08); color: #e0e0e0; border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        清除快取與 Service Worker 救援
      </button>
    </div>
  </div>
</div>

<script>
  function showDiagnosticError(msg, stack) {
    document.getElementById('diagnostic-error-panel').style.display = 'flex';
    const errorEl = document.getElementById('diagnostic-error-msg');
    const fullMsg = msg + (stack ? '\n' + stack : '');
    if (!errorEl.textContent.includes(msg)) {
      errorEl.textContent = (errorEl.textContent + '\n-------------------------\n' + fullMsg).trim();
    }
  }
  window.addEventListener('error', function(e) {
    showDiagnosticError(e.message, e.error ? e.error.stack : '');
  });
  window.addEventListener('unhandledrejection', function(e) {
    showDiagnosticError('Unhandled Promise Rejection: ' + e.reason, e.reason ? e.reason.stack : '');
  });
</script>

<script type="module">
  import * as esbuild from 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.2/esm/browser.min.js';
  
  async function bootstrap() {
    // Ensure the CRDT store with its native imports is loaded and initialized FIRST
    await import('./crdt-store.js?v=25');

    await esbuild.initialize({
      wasmURL: 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.2/esbuild.wasm',
    });

    const scripts = Array.from(document.querySelectorAll('script[type="text/babel"]'));
    
    for (const script of scripts) {
      let code = '';
      if (script.src) {
        const res = await fetch(script.src);
        if (!res.ok) throw new Error(`無法載入 Script 資源: ${script.src} (HTTP ${res.status})`);
        code = await res.text();
      } else {
        code = script.innerHTML;
      }

      const result = await esbuild.transform(code, {
        loader: 'jsx',
        jsxFactory: 'React.createElement',
        jsxFragment: 'React.Fragment',
        target: 'es2020'
      });

      const newScript = document.createElement('script');
      newScript.textContent = result.code;
      document.body.appendChild(newScript);
    }
  }

  bootstrap().catch(err => {
    console.error('Bootstrap failed:', err);
    showDiagnosticError(err.message, err.stack);
  });
</script>
