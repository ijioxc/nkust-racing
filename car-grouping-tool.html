<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NKUST Racing — 零件分組工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#f5f5f7;--sf:#fff;
  --ink:#1d1d1f;--ink2:#424245;--ink3:#6e6e73;--ink4:#aeaeb2;
  --b:.5px solid rgba(0,0,0,.09);--bm:.5px solid rgba(0,0,0,.13);
  --red:#ef4444;--eout:cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

.hdr{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);border-bottom:var(--bm);z-index:300}
.hdr-l{display:flex;align-items:center;gap:10px}
.mark{width:22px;height:22px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.mark span{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:#fff;letter-spacing:-.3px}
.wm{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.sep{color:var(--ink4);margin:0 6px;font-weight:300}
.sub{color:var(--ink3);font-size:12px}
.hdr-r{display:flex;gap:6px}
.hb{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--ink2);background:rgba(0,0,0,.05);border:none;cursor:pointer;padding:5px 12px;border-radius:8px;transition:background .15s;text-decoration:none}
.hb:hover{background:rgba(0,0,0,.09)}

.app{display:flex;flex:1;overflow:hidden;min-height:0}
.viewer{flex:1;position:relative;background:#e6e6ea;overflow:hidden;min-width:0}
#mount{width:100%;height:100%;position:relative}

.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#e6e6ea;z-index:20;transition:opacity .5s}
.ring{width:28px;height:28px;border:1.5px solid rgba(0,0,0,.12);border-top-color:var(--ink3);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ink4);text-transform:uppercase}

/* Selection box overlay */
.sel-box{position:absolute;border:1.5px solid var(--red);background:rgba(239,68,68,.08);pointer-events:none;display:none;z-index:10}

/* Viewport badge */
.ebadge{position:absolute;top:16px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--red);background:rgba(239,68,68,.08);border:.5px solid rgba(239,68,68,.22);padding:4px 10px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .3s}
.ebadge.on{opacity:1}

/* Hover tooltip */
.tt{position:absolute;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;color:var(--ink);background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border:var(--bm);padding:4px 10px;border-radius:6px;opacity:0;transition:opacity .10s;z-index:50;white-space:nowrap}
.tt.on{opacity:1}

/* Bottom toolbar */
.vt{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:3px;background:rgba(255,255,255,.93);backdrop-filter:saturate(180%) blur(16px);border:var(--bm);border-radius:14px;padding:5px 7px;box-shadow:0 2px 12px rgba(0,0,0,.10),0 8px 32px rgba(0,0,0,.07);z-index:100;white-space:nowrap}
.vg{display:flex;align-items:center;gap:1px}
.vs{width:.5px;height:17px;background:rgba(0,0,0,.12);margin:0 3px;flex-shrink:0}
.vb{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.04em;color:var(--ink3);background:transparent;border:none;cursor:pointer;padding:5px 8px;border-radius:7px;transition:color .12s,background .12s;display:flex;align-items:center;gap:4px;user-select:none;white-space:nowrap}
.vb:hover{color:var(--ink);background:rgba(0,0,0,.06)}
.vb.on{color:var(--ink);background:rgba(0,0,0,.08);font-weight:600}
.vl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:500;letter-spacing:.10em;color:var(--ink4);text-transform:uppercase;flex-shrink:0}
.vv{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);min-width:24px;text-align:right;flex-shrink:0}
.esl{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(0,0,0,.14);outline:none;cursor:pointer;flex-shrink:0}
.esl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.20)}

/* Panel */
.panel{width:320px;flex-shrink:0;background:#f0f0f4;border-left:var(--bm);display:flex;flex-direction:column;overflow:hidden}
.panel-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.panel-scroll::-webkit-scrollbar{width:3px}
.panel-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.10);border-radius:2px}

.gc{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border:.5px solid rgba(255,255,255,.88);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.04)}

.sec-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--ink4);padding:0 2px;margin-bottom:4px}

/* Stats card */
.stat-card{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.stat-row{display:flex;justify-content:space-between;align-items:baseline}
.stat-k{font-size:11px;color:var(--ink3)}
.stat-v{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ink)}

/* Group grid */
.grp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grp-btn{padding:10px 12px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:transform .12s var(--eout),box-shadow .12s;border:2px solid transparent;user-select:none}
.grp-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.10)}
.grp-btn.active{border-color:var(--red)}
.grp-swatch{width:100%;height:4px;border-radius:2px}
.grp-name{font-size:11px;font-weight:600;color:var(--ink);line-height:1.2}
.grp-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink4)}

/* Action buttons */
.act-row{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.04em;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;transition:background .15s,color .15s}
.act-primary{background:var(--red);color:#fff}
.act-primary:hover{background:#dc2626}
.act-primary:disabled{background:var(--ink4);cursor:default}
.act-secondary{background:rgba(0,0,0,.06);color:var(--ink2)}
.act-secondary:hover{background:rgba(0,0,0,.10)}
.act-full{width:100%}

/* Selection info */
.sel-info{padding:12px 14px;font-size:11px;color:var(--ink2);line-height:1.6;border-left:2.5px solid var(--red)}

/* File input */
.file-zone{padding:16px;border:1.5px dashed rgba(0,0,0,.15);border-radius:12px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.file-zone:hover{border-color:var(--red);background:rgba(239,68,68,.03)}
.file-zone input{display:none}
.file-zone p{font-size:11px;color:var(--ink3);margin-top:4px}

/* Helper text */
.help-text{font-size:10px;color:var(--ink4);line-height:1.5;padding:0 2px}

@media(max-width:900px){
  html,body{overflow:auto}
  .app{flex-direction:column;overflow:visible}
  .viewer{height:55vw;min-height:260px;flex:none}
  .panel{width:100%;border-left:none;border-top:var(--bm)}
}
</style>

<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="mark"><span>NR</span></div>
    <span class="wm">NKUST Racing</span>
    <span class="sep">/</span>
    <span class="sub">零件分組工具</span>
  </div>
  <div class="hdr-r">
    <a class="hb" href="car-blueprint.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回解析頁
    </a>
  </div>
</header>

<div class="app">
  <div class="viewer">
    <div id="mount"></div>
    <div class="loading" id="loading">
      <div class="ring"></div>

    <div class="ebadge" id="ebadge">EXPLODE VIEW</div>

        <button class="vb on" data-view="iso">ISO</button>

      </div>

        <span class="vv" id="ev">0%</span>
      </div>
      <div class="vs"></div>
      <div class="vg">
        <button class="vb" id="btn-grow" title="擴大選取範圍">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          擴選
        </button>
        <button class="vb" id="btn-invert" title="反轉選取">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 3l18 18"/></svg>
          反選
        </button>
      </div>
      <div class="vs"></div>
      <button class="vb" id="btn-reset">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>重置
      </button>

  <div class="panel">
    <div class="panel-scroll">

      <div class="sec-label">模型資訊</div>

        <div class="stat-row"><span class="stat-k">零件數</span><span class="stat-v" id="s-parts">—</span></div>
        <div class="stat-row"><span class="stat-k">三角面</span><span class="stat-v" id="s-tris">—</span></div>
        <div class="stat-row"><span class="stat-k">已選取</span><span class="stat-v" id="s-sel">0</span></div>

      <div class="sec-label">操作</div>

        Shift+點擊 → 加選 / 取消選取<br>
        拖曳框選 → 多選（按住不動再拖動）<br>
        爆炸滑桿 → 展開零件以點選內部
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// FSAE Rules-based grouping
const GROUPS = {
  chassis:    { label: '車架結構', sub: 'Frame · FSAE Part F',       hex: '#bec8d2' },
  suspension: { label: '懸吊系統', sub: 'Suspension · FSAE T.1',     hex: '#4a6882' },
  steering:   { label: '轉向系統', sub: 'Steering · FSAE T.2',       hex: '#6a5acd' },
  brake:      { label: '煞車系統', sub: 'Brakes · FSAE T.3',         hex: '#cc3333' },
  wheel:      { label: '輪組',     sub: 'Wheels & Tires · FSAE T.4', hex: '#1a1a1a' },
  drivetrain: { label: '動力系統', sub: 'Powertrain · FSAE T.6',     hex: '#8a6030' },
  aero:       { label: '空力套件', sub: 'Aerodynamics · FSAE T.7',   hex: '#334a5e' },
  bodywork:   { label: '車殼',     sub: 'Bodywork & Fairings',        hex: '#c8d4de' },
  unassigned: { label: '未分類',   sub: 'Unassigned',                 hex: '#999999' },
};

// ── Union-Find ───────────────────────────────────────────────────────────────
class UF {
  constructor(n) { this.p = Array.from({length:n},(_,i)=>i); this.r = new Uint8Array(n); }
  find(x) { while(this.p[x]!==x) x=this.p[x]=this.p[this.p[x]]; return x; }
  union(a,b) { a=this.find(a); b=this.find(b); if(a===b)return; if(this.r[a]<this.r[b])[a,b]=[b,a]; this.p[b]=a; if(this.r[a]===this.r[b])this.r[a]++; }
}

// ── Three.js setup ───────────────────────────────────────────────────────────
const mount = document.getElementById('mount');
const W = ()=>mount.clientWidth, H = ()=>mount.clientHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe6e6ea);
const camera = new THREE.PerspectiveCamera(44, W()/H(), 0.05, 500);
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setSize(W(), H());
Object.assign(renderer.domElement.style, { position:'absolute', inset:'0' });
mount.appendChild(renderer.domElement);

const ambLight = new THREE.AmbientLight(0xffffff, 1.1); scene.add(ambLight);
const keyLight = new THREE.DirectionalLight(0xfff5e8, 1.5);
keyLight.position.set(5,9,5); keyLight.castShadow = true; keyLight.shadow.mapSize.setScalar(2048);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xc5dcff, 0.55);
fillLight.position.set(-5,3,-4); scene.add(fillLight);
const hemiLight = new THREE.HemisphereLight(0xffffff, 0xd6dce8, 0.5); scene.add(hemiLight);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(16, 64),
  new THREE.MeshStandardMaterial({ color:0xd8d8de, roughness:0.96 })
);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.055;

// ── Data model ───────────────────────────────────────────────────────────────
let components = [];     // [{id, tris:[], verts:Set, centroid:V3, group:string, polyCount}]
let triToComp = null;    // Uint32Array
let mainMesh = null;     // single mesh for display
let origPositions = null;// Float32Array
let modelCenter = new THREE.Vector3();
let selectedComps = new Set();
let hoveredComp = -1;
let activeGroup = 'chassis';

const carBox = new THREE.Box3();
const VIEW = {};
let ca = null;

// ── Separate geometry into connected components ──────────────────────────────
function separateLoose(geo) {
  const pos = geo.attributes.position;
  const vertCount = pos.count;

  let indexArr;
  if (geo.index) {
    indexArr = geo.index.array;
  } else {
    indexArr = new Uint32Array(vertCount);
    for (let i = 0; i < vertCount; i++) indexArr[i] = i;
  }
  const triCount = indexArr.length / 3;

  // Union-Find on vertex indices via shared triangle edges
  const uf = new UF(vertCount);
  for (let i = 0; i < indexArr.length; i += 3) {
    uf.union(indexArr[i], indexArr[i+1]);
    uf.union(indexArr[i+1], indexArr[i+2]);
  }

  // Also union vertices sharing the same position (handles unwelded seams)
  const posMap = new Map();
  for (let i = 0; i < vertCount; i++) {
    const key = `${(pos.getX(i)*1000|0)},${(pos.getY(i)*1000|0)},${(pos.getZ(i)*1000|0)}`;
    if (posMap.has(key)) uf.union(i, posMap.get(key));
    else posMap.set(key, i);
  }

  // Group triangles by component root
  const rootToTris = new Map();
  for (let t = 0; t < triCount; t++) {
    const root = uf.find(indexArr[t*3]);
    if (!rootToTris.has(root)) rootToTris.set(root, []);
    rootToTris.get(root).push(t);
  }

  // Build component list
  const comps = [];
  const t2c = new Uint32Array(triCount);
  let id = 0;
  for (const [, tris] of rootToTris) {
    const verts = new Set();
    let cx = 0, cy = 0, cz = 0;
    for (const t of tris) {
      t2c[t] = id;
      for (let j = 0; j < 3; j++) {
        const vi = indexArr[t*3+j];
        verts.add(vi);
      }
      const i0 = indexArr[t*3], i1 = indexArr[t*3+1], i2 = indexArr[t*3+2];
      cx += (pos.getX(i0)+pos.getX(i1)+pos.getX(i2))/3;
      cy += (pos.getY(i0)+pos.getY(i1)+pos.getY(i2))/3;
      cz += (pos.getZ(i0)+pos.getZ(i1)+pos.getZ(i2))/3;
    }
    comps.push({
      id, tris, verts,
      centroid: new THREE.Vector3(cx/tris.length, cy/tris.length, cz/tris.length),
      group: 'unassigned',
      polyCount: tris.length,
    });
    id++;
  }
  return { comps, triToComp: t2c };
}

// ── Color management ─────────────────────────────────────────────────────────
const groupColors = {};
for (const [k,g] of Object.entries(GROUPS)) groupColors[k] = new THREE.Color(g.hex);
const SEL_COLOR = new THREE.Color(0xef4444);
const HOV_COLOR = new THREE.Color(0xff8888);

function updateColors() {
  if (!mainMesh) return;
  const colors = mainMesh.geometry.attributes.color;
  const arr = colors.array;

  for (const comp of components) {
    let c;
    if (selectedComps.has(comp.id)) c = SEL_COLOR;
    else if (comp.id === hoveredComp) c = HOV_COLOR;
    else c = groupColors[comp.group] || groupColors.unassigned;

    for (const vi of comp.verts) {
      arr[vi*3]   = c.r;
      arr[vi*3+1] = c.g;
      arr[vi*3+2] = c.b;
    }
  }
  colors.needsUpdate = true;
}

// ── Explode ──────────────────────────────────────────────────────────────────
let eTgt = 0, eCur = 0;
const EMAX = 2.5;

function applyExplode(factor) {
  if (!mainMesh || !origPositions) return;
  const pos = mainMesh.geometry.attributes.position;
  const arr = pos.array;
  const orig = origPositions;

  for (const comp of components) {
    const dir = comp.centroid.clone().sub(modelCenter);
    if (dir.length() < 0.001) dir.set(0,1,0);
    else { dir.normalize(); dir.y = Math.max(dir.y, 0.05); dir.normalize(); }
    const ox = dir.x * factor * EMAX;
    const oy = dir.y * factor * EMAX;
    const oz = dir.z * factor * EMAX;
    for (const vi of comp.verts) {
      arr[vi*3]   = orig[vi*3]   + ox;
      arr[vi*3+1] = orig[vi*3+1] + oy;
      arr[vi*3+2] = orig[vi*3+2] + oz;
    }
  }
  pos.needsUpdate = true;
  mainMesh.geometry.computeBoundingSphere();
}

// ── Load and process model ───────────────────────────────────────────────────
function processGLTF(gltf) {
  const ltxt = document.getElementById('ltxt');
  ltxt.textContent = '分析模型結構…';

  // Remove previous model
  if (mainMesh) { scene.remove(mainMesh); mainMesh.geometry.dispose(); mainMesh = null; }
  components = []; selectedComps.clear(); hoveredComp = -1;

  const model = gltf.scene;
  const rawMeshes = [];
  model.traverse(c => { if (c.isMesh) rawMeshes.push(c); });
  if (!rawMeshes.length) { ltxt.textContent = '未找到 mesh'; return; }

  // Merge all meshes into one geometry
  ltxt.textContent = '合併幾何體…';

  // Normalize to scene center
  const b0 = new THREE.Box3().setFromObject(model);
  const c0 = b0.getCenter(new THREE.Vector3());
  const s0 = b0.getSize(new THREE.Vector3());
  const sc = 3.4 / Math.max(s0.x, s0.y, s0.z);

  model.position.sub(c0);
  model.scale.setScalar(sc);
  model.updateWorldMatrix(true, true);
  const b1 = new THREE.Box3().setFromObject(model);
  model.position.y -= b1.min.y;
  model.updateWorldMatrix(true, true);

  // Bake world transforms into each mesh geometry
  const geos = [];
  for (const m of rawMeshes) {
    const g = m.geometry.clone();
    g.applyMatrix4(m.matrixWorld);
    if (!g.index) {
      const arr = new Uint32Array(g.attributes.position.count);
      for (let i = 0; i < arr.length; i++) arr[i] = i;
      g.setIndex(new THREE.BufferAttribute(arr, 1));
    }
    if (!g.attributes.normal) g.computeVertexNormals();
    geos.push(g);
  }

  const isMultiMesh = geos.length > 1;

  // Merge geometries into single buffer
  let totalVerts = 0, totalIdx = 0;
  for (const g of geos) { totalVerts += g.attributes.position.count; totalIdx += g.index.count; }

  const mergedPos = new Float32Array(totalVerts * 3);
  const mergedNorm = new Float32Array(totalVerts * 3);
  const mergedIdx = new Uint32Array(totalIdx);
  const meshRanges = []; // [{triStart, triCount, vStart, vCount}] per original mesh
  let vOff = 0, iOff = 0;
  for (const g of geos) {
    const vc = g.attributes.position.count;
    const ic = g.index.count;
    mergedPos.set(g.attributes.position.array.slice(0, vc*3), vOff*3);
    if (g.attributes.normal) mergedNorm.set(g.attributes.normal.array.slice(0, vc*3), vOff*3);
    const idx = g.index.array;
    for (let i = 0; i < ic; i++) mergedIdx[iOff+i] = idx[i] + vOff;
    meshRanges.push({ triStart: iOff/3, triCount: ic/3, vStart: vOff, vCount: vc });
    vOff += vc; iOff += ic;
    g.dispose();
  }

  const mergedGeo = new THREE.BufferGeometry();
  mergedGeo.setAttribute('position', new THREE.BufferAttribute(mergedPos, 3));
  mergedGeo.setAttribute('normal', new THREE.BufferAttribute(mergedNorm, 3));
  mergedGeo.setIndex(new THREE.BufferAttribute(mergedIdx, 1));

  if (isMultiMesh) {
    // Multi-mesh: each original mesh = one component (preserves CAD body boundaries)
    ltxt.textContent = `建立零件（${geos.length} 個 mesh）…`;
  } else {
    ltxt.textContent = '分離零件（Union-Find）…';
  }

  setTimeout(() => {
    const pos = mergedGeo.attributes.position;
    const totalTris = mergedIdx.length / 3;

    if (isMultiMesh) {
      // Each original mesh becomes a component — no Union-Find
      triToComp = new Uint32Array(totalTris);
      components = [];
      for (let mi = 0; mi < meshRanges.length; mi++) {
        const mr = meshRanges[mi];
        const tris = [];
        const verts = new Set();
        let cx = 0, cy = 0, cz = 0;
        for (let t = mr.triStart; t < mr.triStart + mr.triCount; t++) {
          tris.push(t);
          triToComp[t] = mi;
          const i0 = mergedIdx[t*3], i1 = mergedIdx[t*3+1], i2 = mergedIdx[t*3+2];
          verts.add(i0); verts.add(i1); verts.add(i2);
          cx += (pos.getX(i0)+pos.getX(i1)+pos.getX(i2))/3;
          cy += (pos.getY(i0)+pos.getY(i1)+pos.getY(i2))/3;
          cz += (pos.getZ(i0)+pos.getZ(i1)+pos.getZ(i2))/3;
        }
        if (tris.length === 0) continue;
        components.push({
          id: components.length, tris, verts,
          centroid: new THREE.Vector3(cx/tris.length, cy/tris.length, cz/tris.length),
          group: 'unassigned', polyCount: tris.length,
        });
      }
    } else {
      // Single mesh: Union-Find separation
      const result = separateLoose(mergedGeo);
      components = result.comps;
      triToComp = result.triToComp;
    }

    // Add vertex color attribute
    const colorArr = new Float32Array(totalVerts * 3).fill(0.6);
    mergedGeo.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));

    origPositions = new Float32Array(mergedPos);

    const mat = new THREE.MeshStandardMaterial({
      vertexColors: true, metalness: 0.18, roughness: 0.52,
      side: THREE.DoubleSide,
    });
    mainMesh = new THREE.Mesh(mergedGeo, mat);
    mainMesh.castShadow = true;
    mainMesh.receiveShadow = true;
    scene.add(mainMesh);

    carBox.setFromObject(mainMesh);
    modelCenter.copy(carBox.getCenter(new THREE.Vector3()));

    updateColors();
    updateStats();
    buildGroupGrid();
    finishLoad();
  }, 30);
}

function finishLoad() {
  const s = carBox.getSize(new THREE.Vector3());
  const cc = carBox.getCenter(new THREE.Vector3());
  const d = Math.max(s.x, s.y, s.z);
  VIEW.iso   = { p: new THREE.Vector3(cc.x+d*.55, cc.y+d*.50, cc.z+d*.85), l: cc.clone() };
  VIEW.front = { p: new THREE.Vector3(cc.x, cc.y+d*.10, cc.z+d*1.7), l: cc.clone() };
  VIEW.side  = { p: new THREE.Vector3(cc.x+d*1.7, cc.y+d*.10, cc.z), l: cc.clone() };
  VIEW.top   = { p: new THREE.Vector3(cc.x, cc.y+d*2.1, cc.z+.01), l: cc.clone() };
  camera.position.copy(VIEW.iso.p);
  controls.target.copy(cc);
  controls.minDistance = d*.15; controls.maxDistance = d*7;
  controls.update();

  document.getElementById('vt').style.display = 'flex';
  const lo = document.getElementById('loading');
  lo.style.opacity = '0'; setTimeout(() => lo.style.display = 'none', 500);
  document.getElementById('btn-export').disabled = false;
  document.getElementById('btn-auto').disabled = false;
}

function buildGroupGrid() {

      <div class="grp-swatch" style="background:${g.hex}"></div>
      <div class="grp-name">${g.label}</div>

// ── Subdivide large components ───────────────────────────────────────────────
function subdivideSelected(divisions = 4) {
  if (!mainMesh || selectedComps.size === 0) return;
  const geo = mainMesh.geometry;
  const pos = geo.attributes.position;
  const idxArr = geo.index.array;
  const newSelection = new Set();

  for (const compId of [...selectedComps]) {
    const comp = components[compId];
    if (comp.polyCount < 20) { newSelection.add(compId); continue; }

    // Compute bounding box of this component
    let minX=Infinity, minY=Infinity, minZ=Infinity;
    let maxX=-Infinity, maxY=-Infinity, maxZ=-Infinity;
    for (const vi of comp.verts) {
      const x=pos.getX(vi), y=pos.getY(vi), z=pos.getZ(vi);
      if(x<minX)minX=x; if(y<minY)minY=y; if(z<minZ)minZ=z;
      if(x>maxX)maxX=x; if(y>maxY)maxY=y; if(z>maxZ)maxZ=z;
    }
    const sx=maxX-minX||0.001, sy=maxY-minY||0.001, sz=maxZ-minZ||0.001;
    const D = divisions;

    // Assign each triangle to a grid cell
    const cells = new Map();
    for (const t of comp.tris) {
      const i0=idxArr[t*3], i1=idxArr[t*3+1], i2=idxArr[t*3+2];
      const cx=(pos.getX(i0)+pos.getX(i1)+pos.getX(i2))/3;
      const cy=(pos.getY(i0)+pos.getY(i1)+pos.getY(i2))/3;
      const cz=(pos.getZ(i0)+pos.getZ(i1)+pos.getZ(i2))/3;
      const gx=Math.min(D-1,Math.floor((cx-minX)/sx*D));
      const gy=Math.min(D-1,Math.floor((cy-minY)/sy*D));
      const gz=Math.min(D-1,Math.floor((cz-minZ)/sz*D));
      const key=gx*D*D+gy*D+gz;
      if(!cells.has(key)) cells.set(key,[]);
      cells.get(key).push(t);
    }

    if (cells.size <= 1) { newSelection.add(compId); continue; }

    // First cell replaces the original component
    let first = true;
    for (const [, tris] of cells) {
      const verts = new Set();
      let cx=0,cy=0,cz=0;
      for (const t of tris) {
        for (let j=0;j<3;j++) verts.add(idxArr[t*3+j]);
        const i0=idxArr[t*3],i1=idxArr[t*3+1],i2=idxArr[t*3+2];
        cx+=(pos.getX(i0)+pos.getX(i1)+pos.getX(i2))/3;
        cy+=(pos.getY(i0)+pos.getY(i1)+pos.getY(i2))/3;
        cz+=(pos.getZ(i0)+pos.getZ(i1)+pos.getZ(i2))/3;
      }
      const centroid = new THREE.Vector3(cx/tris.length,cy/tris.length,cz/tris.length);

      if (first) {
        comp.tris = tris; comp.verts = verts;
        comp.centroid = centroid; comp.polyCount = tris.length;
        for (const t of tris) triToComp[t] = compId;
        newSelection.add(compId);
        first = false;
      } else {
        const newId = components.length;
        components.push({
          id: newId, tris, verts, centroid,
          group: comp.group, polyCount: tris.length,
        });
        for (const t of tris) triToComp[t] = newId;
        newSelection.add(newId);
      }
    }
  }

  selectedComps = newSelection;
  updateColors(); updateStats(); refreshGroupCounts();
}

// ── Auto-classify by position + size ─────────────────────────────────────────
function autoClassify() {
  if (!mainMesh || components.length === 0) return;
  const pos = mainMesh.geometry.attributes.position;
  const oPos = origPositions;
  const size = carBox.getSize(new THREE.Vector3());
  const ctr = modelCenter;

  // Determine car length axis: longest horizontal dimension
  const xLen = size.x, zLen = size.z;
  const fbAxis = xLen > zLen ? 'x' : 'z';
  const lrAxis = xLen > zLen ? 'z' : 'x';
  const fbSize = Math.max(xLen, zLen);
  const lrSize = Math.min(xLen, zLen);
  const udSize = size.y;

  // Detect front vs back: rear wing is highest + at one end
  // Find the component with the highest centroid Y — it's likely rear wing
  let highestComp = null, highestY = -Infinity;
  for (const c of components) {
    if (c.centroid.y > highestY) { highestY = c.centroid.y; highestComp = c; }
  }
  // The end where the highest part sits = rear
  const rearVal = fbAxis === 'x' ? highestComp.centroid.x : highestComp.centroid.z;
  const fbSign = rearVal < ctr[fbAxis] ? -1 : 1;
  // fb > 0 = front, fb < 0 = rear (flip if needed)

  function getNorm(c) {
    const rawFb = (fbAxis === 'x' ? c.centroid.x - ctr.x : c.centroid.z - ctr.z) / (fbSize / 2);
    const fb = rawFb * -fbSign; // positive = front
    const lr = (lrAxis === 'x' ? c.centroid.x - ctr.x : c.centroid.z - ctr.z) / (lrSize / 2);
    const ud = (c.centroid.y - ctr.y) / (udSize / 2);
    return { fb, lr, ud };
  }

  function getBBox(c) {
    let mnX=Infinity,mnY=Infinity,mnZ=Infinity,mxX=-Infinity,mxY=-Infinity,mxZ=-Infinity;
    for (const vi of c.verts) {
      const x=oPos[vi*3],y=oPos[vi*3+1],z=oPos[vi*3+2];
      if(x<mnX)mnX=x;if(y<mnY)mnY=y;if(z<mnZ)mnZ=z;
      if(x>mxX)mxX=x;if(y>mxY)mxY=y;if(z>mxZ)mxZ=z;
    }
    const spanFB = (fbAxis==='x' ? mxX-mnX : mxZ-mnZ) / fbSize;
    const spanLR = (lrAxis==='x' ? mxX-mnX : mxZ-mnZ) / lrSize;
    const spanUD = (mxY-mnY) / udSize;
    return { spanFB, spanLR, spanUD };
  }

  const stats = {};
  for (const c of components) {
    const { fb, lr, ud } = getNorm(c);
    const { spanFB, spanLR, spanUD } = getBBox(c);
    const absLR = Math.abs(lr);
    const poly = c.polyCount;

    let group = 'chassis';

    // 1. Wheels: extreme lateral, low, compact
    if (absLR > 0.55 && ud < -0.15 && spanLR < 0.25 && spanFB < 0.15) {
      group = 'wheel';
    }
    // 2. Brake: near wheel zones, very small, low
    else if (absLR > 0.45 && ud < 0.0 && poly < 300 && spanFB < 0.06 && spanLR < 0.10) {
      group = 'brake';
    }
    // 3. Rear wing: far back, high
    else if (fb < -0.45 && ud > 0.35) {
      group = 'aero';
    }
    // 4. Front aero / front structure: far front
    else if (fb > 0.55 && absLR < 0.7) {
      group = 'aero';
    }
    // 5. Drivetrain: rear-center, mid-low, bigger parts
    else if (fb < 0.05 && fb > -0.65 && absLR < 0.35 && ud < 0.15 && ud > -0.50 && poly > 60) {
      group = 'drivetrain';
    }
    // 6. Bodywork: large panels (wide or long span)
    else if ((spanLR > 0.25 || spanFB > 0.20) && poly > 150 && ud < 0.25) {
      group = 'bodywork';
    }
    // 7. Suspension: near wheel zones, rod-like
    else if (absLR > 0.25 && (fb > 0.30 || fb < -0.20) && spanFB < 0.18 && poly < 2000) {
      group = 'suspension';
    }
    // 8. Steering: front-center, mid height
    else if (fb > 0.15 && absLR < 0.20 && ud > -0.20 && ud < 0.30 && poly < 500) {
      group = 'steering';
    }
    // 9. Default: chassis
    // (already set)

    c.group = group;
    stats[group] = (stats[group] || 0) + 1;
  }

  console.log('Auto-classify stats:', stats);
  updateColors();
  refreshGroupCounts();
  updateStats();
  buildGroupGrid();
}

// ── Raycasting ───────────────────────────────────────────────────────────────
const rc = new THREE.Raycaster();
const mv = new THREE.Vector2();

function getCompAtScreen(x, y) {
  if (!mainMesh) return -1;
  const r = renderer.domElement.getBoundingClientRect();
  mv.x = ((x - r.left) / r.width) * 2 - 1;
  mv.y = -((y - r.top) / r.height) * 2 + 1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObject(mainMesh, false);
  if (!hits.length) return -1;
  return triToComp[hits[0].faceIndex] ?? -1;
}

// ── Mouse interaction ────────────────────────────────────────────────────────
let mdn = null; // {x, y, time, button}
let dragging = false;
const selBox = document.getElementById('sel-box');

renderer.domElement.addEventListener('pointerdown', e => {
  mdn = { x: e.clientX, y: e.clientY, time: performance.now(), button: e.button };
  dragging = false;
});

renderer.domElement.addEventListener('pointermove', e => {
  if (mdn && mdn.button === 0) {
    const dx = e.clientX - mdn.x, dy = e.clientY - mdn.y;
    if (!dragging && dx*dx + dy*dy > 64) {
      dragging = true;
      controls.enabled = false;
    }
    if (dragging) {
      const r = renderer.domElement.getBoundingClientRect();
      const x1 = Math.min(mdn.x, e.clientX) - r.left;
      const y1 = Math.min(mdn.y, e.clientY) - r.top;
      const w = Math.abs(dx), h = Math.abs(dy);
      selBox.style.display = 'block';
      selBox.style.left = x1 + 'px';
      selBox.style.top = y1 + 'px';
      selBox.style.width = w + 'px';
      selBox.style.height = h + 'px';
      return;
    }
  }

  // Hover
  const comp = getCompAtScreen(e.clientX, e.clientY);
  const tt = document.getElementById('tt');
  if (comp !== hoveredComp) {
    hoveredComp = comp;
    updateColors();
  }
  if (comp >= 0) {
    renderer.domElement.style.cursor = 'pointer';
    const c = components[comp];
    tt.textContent = `${GROUPS[c.group]?.label || '未分類'} · ${c.polyCount} 面`;
    const r = renderer.domElement.getBoundingClientRect();
    tt.style.left = (e.clientX - r.left + 14) + 'px';
    tt.style.top = (e.clientY - r.top - 22) + 'px';
    tt.classList.add('on');
  } else {
    renderer.domElement.style.cursor = '';
    tt.classList.remove('on');
  }
});

renderer.domElement.addEventListener('pointerup', e => {
  if (dragging) {
    // Box select: find all components whose projected centroid falls inside the box
    const r = renderer.domElement.getBoundingClientRect();
    const x1 = (Math.min(mdn.x, e.clientX) - r.left) / r.width * 2 - 1;
    const y1 = -((Math.min(mdn.y, e.clientY) - r.top) / r.height) * 2 + 1;
    const x2 = (Math.max(mdn.x, e.clientX) - r.left) / r.width * 2 - 1;
    const y2 = -((Math.max(mdn.y, e.clientY) - r.top) / r.height) * 2 + 1;

    const projMatrix = new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);

    if (!e.shiftKey) selectedComps.clear();
    for (const comp of components) {
      // Use current (possibly exploded) centroid position
      const pos = mainMesh.geometry.attributes.position;
      const firstVert = [...comp.verts][0];
      const wp = new THREE.Vector3(pos.getX(firstVert), pos.getY(firstVert), pos.getZ(firstVert));
      // Better: use actual centroid offset
      const dir = comp.centroid.clone().sub(modelCenter);
      if (dir.length() > 0.001) dir.normalize();
      const exploded = comp.centroid.clone().addScaledVector(dir, eCur * EMAX);
      const proj = exploded.clone().applyMatrix4(projMatrix);

      if (proj.x >= x1 && proj.x <= x2 && proj.y >= y2 && proj.y <= y1) {
        selectedComps.add(comp.id);
      }
    }
    updateColors();
    updateStats();

    selBox.style.display = 'none';
    dragging = false;
    controls.enabled = true;
    mdn = null;
    return;
  }

  if (!mdn || mdn.button !== 0) { mdn = null; return; }
  const dx = e.clientX - mdn.x, dy = e.clientY - mdn.y;
  if (dx*dx + dy*dy > 25) { mdn = null; controls.enabled = true; return; }

  // Click select
  const comp = getCompAtScreen(e.clientX, e.clientY);
  if (comp < 0) {
    if (!e.shiftKey) selectedComps.clear();
  } else if (e.shiftKey) {
    if (selectedComps.has(comp)) selectedComps.delete(comp);
    else selectedComps.add(comp);
  } else {
    selectedComps.clear();
    selectedComps.add(comp);
  }
  updateColors();
  updateStats();
  mdn = null;
  controls.enabled = true;
});

renderer.domElement.addEventListener('mouseleave', () => {
  hoveredComp = -1; updateColors();
  document.getElementById('tt').classList.remove('on');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  goView('iso'); eslEl.value = 0; eTgt = 0; evEl.textContent = '0%';
  document.getElementById('ebadge').classList.remove('on');
  selectedComps.clear(); updateColors(); updateStats();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  selectedComps.clear(); updateColors(); updateStats();
});

document.getElementById('btn-sel-group').addEventListener('click', () => {
  if (selectedComps.size === 0) return;
  const refComp = components[[...selectedComps][0]];
  const group = refComp.group;
  for (const c of components) {
    if (c.group === group) selectedComps.add(c.id);
  }
  updateColors(); updateStats();
});

// Grow selection: add nearby components
document.getElementById('btn-grow').addEventListener('click', () => {
  if (selectedComps.size === 0 || components.length === 0) return;
  const threshold = carBox.getSize(new THREE.Vector3()).length() * 0.06;
  const newSel = new Set(selectedComps);
  for (const c of components) {
    if (newSel.has(c.id)) continue;
    for (const sid of selectedComps) {
      if (c.centroid.distanceTo(components[sid].centroid) < threshold) {
        newSel.add(c.id); break;
      }
    }
  }
  selectedComps = newSel;
  updateColors(); updateStats();
});

// Invert selection
document.getElementById('btn-invert').addEventListener('click', () => {
  const newSel = new Set();
  for (const c of components) {
    if (!selectedComps.has(c.id)) newSel.add(c.id);
  }
  selectedComps = newSel;
  updateColors(); updateStats();
});

// Subdivide selected large parts
document.getElementById('btn-subdivide').addEventListener('click', () => {
  if (selectedComps.size === 0) return;
  subdivideSelected(4);
  buildGroupGrid();
});

// Auto-classify all parts
document.getElementById('btn-auto').addEventListener('click', () => {
  autoClassify();
});

// ── Export ────────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (!mainMesh || components.length === 0) return;

  const exportScene = new THREE.Scene();
  const geo = mainMesh.geometry;
  const idxArr = geo.index.array;
  const posArr = origPositions;
  const normArr = geo.attributes.normal.array;

  // Group components by assigned group
  const groupMap = new Map();
  for (const comp of components) {
    if (!groupMap.has(comp.group)) groupMap.set(comp.group, []);
    groupMap.get(comp.group).push(comp);
  }

  for (const [groupKey, comps] of groupMap) {
    if (groupKey === 'unassigned' && comps.length === 0) continue;

    // Collect all triangles for this group
    const allTris = [];
    for (const c of comps) allTris.push(...c.tris);

    // Build new geometry
    const vertMap = new Map();
    const newPos = [], newNorm = [], newIdx = [];
    for (const t of allTris) {
      for (let j = 0; j < 3; j++) {
        const oldVi = idxArr[t*3+j];
        if (!vertMap.has(oldVi)) {
          const ni = newPos.length / 3;
          vertMap.set(oldVi, ni);
          newPos.push(posArr[oldVi*3], posArr[oldVi*3+1], posArr[oldVi*3+2]);
          newNorm.push(normArr[oldVi*3], normArr[oldVi*3+1], normArr[oldVi*3+2]);
        }
        newIdx.push(vertMap.get(oldVi));
      }
    }

    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(newPos, 3));
    g.setAttribute('normal', new THREE.Float32BufferAttribute(newNorm, 3));
    g.setIndex(newIdx);

    const color = new THREE.Color(GROUPS[groupKey]?.hex || '#999');
    const mat = new THREE.MeshStandardMaterial({ color, metalness:0.25, roughness:0.5 });
    const mesh = new THREE.Mesh(g, mat);
    mesh.name = groupKey;
    exportScene.add(mesh);
  }

  const exporter = new GLTFExporter();
  exporter.parse(exportScene, result => {
    const blob = new Blob([result], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'chassis_grouped.glb';
    a.click();
    URL.revokeObjectURL(url);
  }, err => {
    alert('匯出失敗：' + err.message);
  }, { binary: true });
});

// ── Render loop ──────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  if (ca) {
    const t = Math.min((performance.now()-ca.t0)/ca.dur, 1), e = 1-Math.pow(1-t,4);
    camera.position.lerpVectors(ca.sp, ca.tp, e);
    controls.target.lerpVectors(ca.sl, ca.tl, e);
    if (t >= 1) ca = null;
  }
  const pe = eCur; eCur += (eTgt - eCur) * 0.09;
  if (Math.abs(eCur - pe) > 0.0001) applyExplode(eCur);
  controls.update();
  renderer.render(scene, camera);
})();

new ResizeObserver(() => {
  camera.aspect = W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
}).observe(mount);
</script>
