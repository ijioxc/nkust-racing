<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKUST Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase Realtime Database -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCaLAdn2l-VZJJGk_uVst03MaNEtCJLn0Q",
            authDomain: "nkust-racing.firebaseapp.com",
            databaseURL: "https://nkust-racing-default-rtdb.firebaseio.com/",
            projectId: "nkust-racing",
            storageBucket: "nkust-racing.firebasestorage.app",
            messagingSenderId: "438278825258",
            appId: "1:438278825258:web:b90e07234f150a3c39aa53"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window._fbDb = db;
        window._fbRef = ref;
        window._fbSet = set;
        window._fbOnValue = onValue;

        // 通知主 script Firebase 已就緒
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <style>
        :root {
            --primary-orange: #ED6C00;
            --secondary-yellow: #F6AB00;
            --accent-blue: #006DAD;
            
            --color-chassis: #FF6B6B;
            --color-engine: #4ECDC4;
            --color-suspension: #45B7D1;
            --color-brake: #FFA07A;
            --color-electrical: #98D8C8;
            --color-aero: #A8E6CF;
            --color-other: #95A5A6;
            
            --bg: #ffffff;
            --bg-secondary: #fafafa;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.06);
            --orange-light: rgba(237, 108, 0, 0.1);
            --yellow-light: rgba(246, 171, 0, 0.1);
            --blue-light: rgba(0, 109, 173, 0.1);
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --text-primary: #ececec;
            --text-secondary: #999999;
            --border: #3a3a3a;
            --shadow: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-orange);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }

        .header-pill:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }

        .header-pill-value {
            color: var(--primary-orange);
            font-weight: 700;
        }

        .header-pill.search-active {
            border-color: var(--primary-orange);
            background: var(--orange-light);
        }

        .search-input-pill {
            width: 0;
            max-width: 0;
            opacity: 0;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            pointer-events: none;
        }

        .search-active .search-input-pill {
            width: 140px;
            max-width: 140px;
            opacity: 1;
            pointer-events: auto;
        }

        .top-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
        }

        .search-box {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 14px 8px 34px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .filter-buttons::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn:hover {
            background: var(--yellow-light);
            border-color: var(--secondary-yellow);
        }

        .filter-btn.active {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            color: white;
        }

        /* Show-more button in category sections */
        .show-more-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .show-more-btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }

        .category-section {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .category-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .add-category-btn {
            background: transparent;
            border: none;
            color: var(--primary-orange);
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            padding: 0 4px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .add-category-btn:hover {
            transform: scale(1.15);
            color: var(--secondary-yellow);
        }

        .category-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: auto;
            font-weight: 600;
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        @media (max-width: 1400px) {
            .resources-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .resources-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            header {
                flex-wrap: wrap;
                gap: 8px;
            }
            .header-right {
                gap: 8px;
                flex-wrap: wrap;
            }
            .header-stat {
                font-size: 12px;
            }
            .header-left h1 {
                font-size: 20px;
            }
            .container {
                padding: 12px;
            }
            .category-title {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .resources-grid {
                grid-template-columns: 1fr;
            }
            .header-right {
                gap: 6px;
            }
            .search-input-header.active {
                width: 140px;
            }
        }

        /* Person Card - Vertical Layout for Grid */
        .person-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
            text-align: center;
        }

        .person-card:hover {
            box-shadow: 0 6px 20px var(--shadow);
            transform: translateY(-4px);
            border-color: var(--primary-orange);
        }

        .person-card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .person-avatar-large {
            width: 60px;
            height: 60px;
            background: #2a2a2a;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .person-card:hover .person-avatar-large {
            transform: scale(1.1);
        }

        .person-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .person-info {
            width: 100%;
        }

        .person-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
            transition: all 0.3s ease;
        }

        .person-card:hover .person-name {
            font-size: 17px;
            color: var(--primary-orange);
        }

        .person-work-types {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 6px;
        }

        .work-type-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }

        .person-card:hover .work-type-tag {
            font-size: 11px;
            padding: 5px 12px;
        }

        .person-card-hint {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 6px;
            transition: all 0.3s ease;
        }

        .person-card:hover .person-card-hint {
            font-size: 11px;
            color: var(--primary-orange);
        }

        .person-card-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .person-card:hover .person-card-actions {
            opacity: 1;
        }

        /* Plan Card - Wide Rectangle with Image */
        .plan-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: move;
            position: relative;
        }

        .plan-card:hover {
            box-shadow: 0 6px 24px var(--shadow);
            transform: translateY(-4px);
            border-color: var(--primary-orange);
        }

        .plan-card.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }

        .plan-card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 48px;
        }

        .plan-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .plan-card-content {
            padding: 16px;
        }

        .plan-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .plan-card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            flex: 1;
        }

        .plan-card-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .plan-card-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .plan-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .plan-card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .plan-card:hover .plan-card-actions {
            opacity: 1;
        }

        .plan-card-actions .icon-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
        }

        .plan-card-actions .icon-btn:hover {
            background: var(--primary-orange);
        }

        /* Plan Detail Modal */
        .plan-detail-modal {
            background: var(--bg);
            border-radius: 12px;
            padding: 0;
            max-width: 960px;
        }

        .plan-detail-image {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            background: var(--bg-secondary);
            border-radius: 12px 12px 0 0;
        }

        .plan-detail-content {
            padding: 30px;
        }

        .plan-detail-header {
            margin-bottom: 20px;
        }

        .plan-detail-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .plan-detail-meta {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .plan-detail-body {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
            margin-bottom: 20px;
        }

        .plan-detail-actions {
            display: flex;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* Person Detail Modal - Horizontal Layout */
        .person-detail-modal {
            background: var(--bg);
            border-radius: 12px;
            padding: 30px;
        }

        .person-detail-content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .person-detail-avatar {
            width: 120px;
            height: 120px;
            background: #2a2a2a;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            overflow: hidden;
        }

        .person-detail-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .person-detail-info {
            flex: 1;
        }

        .person-detail-name {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .person-detail-contact {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 6px 0;
        }

        .person-detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .person-detail-tag {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .person-detail-extra {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .person-detail-field {
            margin-bottom: 12px;
        }

        .person-detail-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .person-detail-value {
            font-size: 14px;
            color: var(--text-primary);
        }

        .person-detail-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .resource-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .resource-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .resource-card.pinned {
            border-left: 3px solid var(--secondary-yellow);
            background: var(--yellow-light);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .resource-name {
            font-size: 15px;
            font-weight: 700;
            flex: 1;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .card-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .icon-btn:hover {
            background: var(--orange-light);
            color: var(--primary-orange);
        }

        .priority-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .priority-high {
            background: var(--orange-light);
            color: var(--primary-orange);
        }

        .priority-medium {
            background: var(--yellow-light);
            color: #c48a00;
        }

        .priority-low {
            background: var(--blue-light);
            color: var(--accent-blue);
        }

        .resource-description {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .resource-url {
            color: var(--accent-blue);
            font-size: 12px;
            text-decoration: none;
        }

        .resource-url:hover {
            text-decoration: underline;
        }

        .resource-preview-wrap {
            width: calc(100% + 32px);
            margin: -16px -16px 12px -16px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px 8px 0 0;
            background: var(--bg-secondary);
        }

        .resource-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .resource-card:hover .resource-preview-img {
            transform: scale(1.03);
        }

        /* Timeline */
        .timeline-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .timeline-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .timeline-range-btn {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timeline-range-btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
        }

        .timeline-range-btn.active {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            color: white;
        }

        .timeline-scale {
            position: relative;
            height: 40px;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .timeline-tick {
            position: absolute;
            bottom: 0;
            transform: translateX(-50%);
            text-align: center;
        }

        .timeline-tick-line {
            width: 1px;
            height: 8px;
            background: var(--border);
            margin: 0 auto 4px;
        }

        .timeline-tick-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .timeline-today {
            position: absolute;
            top: 0;
            bottom: -250px;
            width: 2px;
            background: var(--primary-orange);
            border-left: 2px dashed var(--primary-orange);
            z-index: 10;
            pointer-events: none;
        }

        .timeline-today-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-orange);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .timeline-tracks {
            position: relative;
            min-height: 200px;
        }

        .timeline-track {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            min-height: 60px;
            position: relative;
        }

        .track-label {
            width: 80px;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-primary);
            padding-top: 8px;
        }

        .track-timeline {
            flex: 1;
            position: relative;
            min-height: 60px;
        }

        .timeline-item {
            position: absolute;
            height: 50px;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .timeline-item:hover {
            z-index: 20;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .timeline-item-title {
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }

        .timeline-item-progress {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-top: 2px;
        }

        .worklog-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary-orange);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .worklog-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .worklog-card.completed {
            border-left-color: var(--accent-blue);
        }

        .worklog-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .worklog-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .worklog-progress {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-orange);
        }

        .worklog-card.completed .worklog-progress {
            color: var(--accent-blue);
        }

        .worklog-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .worklog-description {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .worklog-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .view-toggle-btn {
            padding: 6px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-toggle-btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
        }

        .view-toggle-btn.active {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 960px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--primary-orange);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            width: 32px;
            height: 32px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-primary);
        }

        .close-btn:hover {
            background: var(--orange-light);
        }

        /* Worklog Detail Card */
        .worklog-detail-card {
            background: var(--bg);
            border-radius: 8px;
            padding: 20px;
        }

        .worklog-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .worklog-detail-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .worklog-detail-actions {
            display: flex;
            gap: 8px;
        }

        .worklog-detail-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .worklog-detail-field {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 6px;
        }

        .worklog-detail-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .worklog-detail-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .worklog-detail-notes {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .worklog-detail-notes-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .worklog-detail-notes-content {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-help {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .upload-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .upload-option-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .upload-option-btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }

        .date-input-wrapper {
            position: relative;
        }

        .date-weekday {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: var(--text-primary);
            color: var(--bg);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            display: none;
        }

        .notification.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        .avatar-upload {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            background: var(--orange-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 40px;
        }

        .avatar-preview svg {
            width: 60px;
            height: 60px;
            fill: var(--primary-orange);
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .upload-btn:hover {
            background: var(--orange-light);
            border-color: var(--primary-orange);
        }

        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .emoji-option {
            font-size: 24px;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .emoji-option:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <div class="container">

                </div>

                </button>
            </div>

        <div class="filter-buttons">

            <button class="filter-btn" onclick="filterByCategory('人員管理', this)">人員</button>
            <button class="filter-btn" onclick="filterByCategory('工作日誌', this)">日誌</button>
            <button class="filter-btn" onclick="filterByCategory('計畫', this)">計畫</button>
            <button class="filter-btn" onclick="filterByCategory('賽事資訊', this)">賽事</button>
            <button class="filter-btn" onclick="filterByCategory('工程工具', this)">工具</button>
            <button class="filter-btn" onclick="filterByCategory('零件供應商', this)">零件商</button>
            <button class="filter-btn" onclick="filterByCategory('學習資源', this)">資源</button>
        </div>

        <div id="resourcesContainer"></div>
    </div>

    <!-- Worklog Detail Modal -->
    <div class="modal" id="worklogDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">工作日誌詳情</h2>
                <button class="close-btn" onclick="closeWorklogDetail()">×</button>
            </div>
            <div id="worklogDetailContent"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">新增資源</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="resourceForm" onsubmit="saveResource(event)">
                <!-- Person Form -->
                <div id="personFormFields" class="hidden">
                    <div class="avatar-upload">
                        <div class="avatar-preview" id="avatarPreview">👤</div>
                        <div class="emoji-picker" id="emojiPicker" style="display:none;"></div>
                        <button type="button" class="upload-btn" onclick="toggleEmojiPicker()">選擇Emoji</button>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="previewAvatar(event)">
                        <button type="button" class="upload-btn" onclick="document.getElementById('avatarInput').click()" style="margin-left: 8px;">上傳照片</button>
                    </div>
                    
                    <div class="form-group">
                        <label>姓名 *</label>
                        <input type="text" id="formPersonName">
                    </div>

                    <div class="form-group">
                        <label>職位</label>
                        <select id="formPosition">
                            <option value="">選擇職位</option>
                            <option value="隊長">隊長</option>
                            <option value="副隊長">副隊長</option>
                            <option value="組長">組長</option>
                            <option value="成員">成員</option>

                            <option value="助教">助教</option>

                    </div>

                                <input type="checkbox" class="work-type-checkbox" value="車體"> 車體
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="引擎"> 引擎
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="懸吊"> 懸吊
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="煞車"> 煞車
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="電裝"> 電裝
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="空力"> 空力
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="work-type-checkbox" value="其他"> 其他
                            </label>
                        </div>
                    </div>

                    <div class="form-group">

                        <select id="formDepartment" onchange="toggleDepartmentInput()">
                            <option value="">選擇科系</option>

                            <option value="車輛工程系">車輛工程系</option>
                            <option value="模具工程系">模具工程系</option>
                            <option value="電機工程系">電機工程系</option>
                            <option value="電子工程系">電子工程系</option>
                            <option value="環境安全系">環境安全系</option>
                            <option value="造船系">造船系</option>
                            <option value="其他">其他（請輸入）</option>
                        </select>
                        <input type="text" id="formDepartmentOther" placeholder="請輸入科系名稱" style="display: none; margin-top: 8px;">
                    </div>

                    <div class="form-group">
                        <label>年級</label>
                        <select id="formGrade">
                            <option value="">選擇年級</option>
                            <option value="大一">大一</option>
                            <option value="大二">大二</option>
                            <option value="大三">大三</option>
                            <option value="大四">大四</option>
                            <option value="研一">研一</option>
                            <option value="研二">研二</option>
                            <option value="博士班">博士班</option>
                            <option value="教職">教職</option>
                        </select>
                    </div>

                    <div class="form-group">

                    <div class="form-group">

                    <div class="form-group">

                        <input type="tel" id="formPhone" placeholder="0912345678">

                        <textarea id="formSkills" rows="3" placeholder="例如：車輛動力學、CFD模擬、3D建模..."></textarea>

                    <div class="form-group">
                        <label>其他資訊</label>
                        <textarea id="formOtherInfo" rows="3"></textarea>
                    </div>
                </div>

                <!-- Worklog Form - Simplified -->
                <div id="worklogFormFields" class="hidden">
                    <div class="form-group">
                        <label>工作類別 *</label>
                        <select id="formWorkType">
                            <option value="">選擇類別</option>
                            <option value="車體">車體</option>
                            <option value="引擎">引擎</option>
                            <option value="懸吊">懸吊</option>
                            <option value="煞車">煞車</option>
                            <option value="電裝">電裝</option>
                            <option value="空力">空力</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>標題 *</label>
                        <input type="text" id="formWorklogTitle" placeholder="例如：引擎採購">
                    </div>

                    <div class="form-group">
                        <label>完成度 (%)</label>
                        <input type="number" id="formProgress" min="0" max="100" value="0">
                    </div>

                    <div class="form-group">
                        <label>開始日期 *</label>
                        <div class="date-input-wrapper">
                            <input type="date" id="formStartDate" onchange="updateWeekday('formStartDate', 'startWeekday')">
                            <span class="date-weekday" id="startWeekday"></span>
                        </div>
                    </div>

                    <div class="form-group">

                            <option value="工程工具">工程工具</option>

    <script>
        let resources = [];
        const ogImageCache = {}; // url -> og:image URL cache
        let events = [];
        let currentEditId = null;
        let currentFilter = 'all';

        function toggleSearch() {
            const btn = document.getElementById('searchToggle');
            const input = document.getElementById('searchInput');
            const isActive = btn.classList.contains('search-active');
            if (isActive) {
                btn.classList.remove('search-active');

        function handleSearch(event) {
            const searchTerm = event.target.value.toLowerCase().trim();
            
            if (!searchTerm) {
                renderResources();
                return;
            }

            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';

            resources.forEach(resource => {
                const matchesSearch = 
                    resource.name?.toLowerCase().includes(searchTerm) ||
                    resource.description?.toLowerCase().includes(searchTerm) ||
                    resource.workType?.toLowerCase().includes(searchTerm) ||
                    resource.category?.toLowerCase().includes(searchTerm) ||
                    resource.email?.toLowerCase().includes(searchTerm) ||
                    resource.phone?.includes(searchTerm);

                if (matchesSearch && (currentFilter === 'all' || resource.category === currentFilter)) {
                    const grid = document.createElement('div');
                    grid.className = 'resources-grid';
                    
                    if (resource.isPerson) {
                        grid.appendChild(createPersonCard(resource));
                    } else if (resource.isWorklog) {
                        grid.appendChild(createWorklogCard(resource));
                    } else if (resource.isPlan) {
                        grid.appendChild(createPlanCard(resource));
                    } else {
                        grid.appendChild(createResourceCard(resource));
                    }
                    
                    container.appendChild(grid);
                }
            });
        }

        function updateHeaderStats() {
            document.getElementById('peopleCount').textContent = 
                resources.filter(r => r.category === '人員管理').length;

            const logs = resources.filter(r => r.category === '工作日誌')
                .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            
            if (logs.length > 0 && logs[0].createdAt) {
                const d = new Date(logs[0].createdAt);
                document.getElementById('lastLogDate').textContent = `${d.getMonth()+1}/${d.getDate()}`;
            } else {
                document.getElementById('lastLogDate').textContent = '-';
            }
        }

        function renderResources() {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';

            categories.forEach(category => {
                const categoryResources = resources
                    .filter(r => r.category === category && (currentFilter === 'all' || currentFilter === category))
                    .sort((a, b) => {
                        if (a.pinned && !b.pinned) return -1;
                        if (!a.pinned && b.pinned) return 1;
                        return 0;
                    });

                if (categoryResources.length === 0 && currentFilter !== 'all') return;

                const section = document.createElement('div');
                section.className = 'category-section';

                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title">${category}</h2>
                        <button class="add-category-btn" onclick="openAddModalForCategory('${category}')">+</button>
                        <span class="category-count">${categoryResources.length}</span>
                    </div>
                    ${category === '工作日誌' ? `
                        <div class="view-toggle">
                            <button class="view-toggle-btn ${worklogViewMode === 'timeline' ? 'active' : ''}" onclick="switchWorklogView('timeline')">時間軸</button>
                            <button class="view-toggle-btn ${worklogViewMode === 'cards' ? 'active' : ''}" onclick="switchWorklogView('cards')">卡片</button>
                        </div>
                    ` : ''}
                    <div class="content-area"></div>
                `;

                container.appendChild(section);

                const contentArea = section.querySelector('.content-area');

                if (category === '工作日誌' && worklogViewMode === 'timeline') {
                    contentArea.appendChild(createWorklogTimeline(categoryResources));
                } else {
                    const grid = document.createElement('div');
                    grid.className = 'resources-grid';
                    
                    // Sort plans by order
                    const sortedResources = category === '計畫' 
                        ? [...categoryResources].sort((a, b) => (a.order || 0) - (b.order || 0))
                        : categoryResources;

                    // In overview mode, limit to 6 per category
                    const isOverview = currentFilter === 'all';
                    const OVERVIEW_LIMIT = 6;
                    const displayResources = (isOverview && sortedResources.length > OVERVIEW_LIMIT)
                        ? sortedResources.slice(0, OVERVIEW_LIMIT)
                        : sortedResources;
                    const hiddenCount = sortedResources.length - displayResources.length;
                    
                    displayResources.forEach(resource => {
                        if (resource.isPerson) {
                            grid.appendChild(createPersonCard(resource));
                        } else if (resource.isWorklog) {
                            grid.appendChild(createWorklogCard(resource));
                        } else if (resource.isPlan) {
                            grid.appendChild(createPlanCard(resource));
                        } else if (resource.category === '學習資源' || resource.category === '零件供應商' || resource.category === '賽事資訊') {
                            grid.appendChild(createPlanCard(resource));
                        } else {
                            grid.appendChild(createResourceCard(resource));
                        }
                    });
                    
                    contentArea.appendChild(grid);

                    // Show-more button
                    if (isOverview && hiddenCount > 0) {
                        const moreBtn = document.createElement('button');
                        moreBtn.className = 'show-more-btn';
                        moreBtn.innerHTML = `展開查看全部 ${sortedResources.length} 筆 ▾`;
                        moreBtn.onclick = () => filterByCategory(category, null);
                        contentArea.appendChild(moreBtn);
                    }
                }
            });
        }

        function createWorklogTimeline(worklogs) {
            if (worklogs.length === 0) {
                const empty = document.createElement('div');
                empty.style.padding = '40px';
                empty.style.textAlign = 'center';
                empty.style.color = 'var(--text-secondary)';
                empty.textContent = '尚無工作日誌';
                return empty;
            }

            const timeline = document.createElement('div');
            timeline.className = 'timeline-container';

            let minDate = new Date();
            let maxDate = new Date();
            
            worklogs.forEach(log => {
                const start = new Date(log.startDate || log.createdAt);
                const end = new Date(log.endDate || log.startDate || log.createdAt);
                if (start < minDate) minDate = start;
                if (end > maxDate) maxDate = end;
            });

            const today = new Date();
            if (timelineRange === '1month') {
                minDate = new Date(today.getFullYear(), today.getMonth(), 1);
                maxDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            } else if (timelineRange === '3months') {
                minDate = new Date(today.getTime() - 90*24*60*60*1000);
                maxDate = new Date(today.getTime() + 90*24*60*60*1000);
            } else if (timelineRange === '6months') {
                minDate = new Date(today.getTime() - 180*24*60*60*1000);
                maxDate = new Date(today.getTime() + 180*24*60*60*1000);
            } else if (timelineRange === '12months') {
                minDate = new Date(today.getTime() - 365*24*60*60*1000);
                maxDate = new Date(today.getTime() + 365*24*60*60*1000);
            } else {
                const padding = (maxDate - minDate) * 0.1;
                minDate = new Date(minDate.getTime() - padding);
                maxDate = new Date(maxDate.getTime() + padding);
            }

            const totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);

            timeline.innerHTML = `
                <div class="timeline-controls">
                    <button class="timeline-range-btn ${timelineRange === 'auto' ? 'active' : ''}" onclick="setTimelineRange('auto')">全部</button>
                    <button class="timeline-range-btn ${timelineRange === '1month' ? 'active' : ''}" onclick="setTimelineRange('1month')">月</button>
                    <button class="timeline-range-btn ${timelineRange === '3months' ? 'active' : ''}" onclick="setTimelineRange('3months')">3個月</button>
                    <button class="timeline-range-btn ${timelineRange === '6months' ? 'active' : ''}" onclick="setTimelineRange('6months')">6個月</button>
                    <button class="timeline-range-btn ${timelineRange === '12months' ? 'active' : ''}" onclick="setTimelineRange('12months')">12個月</button>
                </div>
                <div class="timeline-scale" id="timelineScale"></div>
                <div class="timeline-tracks" id="timelineTracks"></div>
            `;

            const scale = timeline.querySelector('#timelineScale');
            const tickCount = totalDays < 30 ? 10 : totalDays < 180 ? 12 : 12;
            
            for (let i = 0; i <= tickCount; i++) {
                const percent = (i / tickCount) * 100;
                const tickDate = new Date(minDate.getTime() + (maxDate - minDate) * (i / tickCount));
                
                const tick = document.createElement('div');
                tick.className = 'timeline-tick';
                tick.style.left = percent + '%';
                
                let label;
                if (totalDays < 30) {
                    label = `${tickDate.getMonth()+1}/${tickDate.getDate()}`;
                } else if (totalDays < 180) {
                    label = `${tickDate.getMonth()+1}/${tickDate.getDate()}`;
                } else {
                    label = `${tickDate.getFullYear()}/${tickDate.getMonth()+1}`;
                }
                
                tick.innerHTML = `
                    <div class="timeline-tick-line"></div>
                    <div class="timeline-tick-label">${label}</div>
                `;
                scale.appendChild(tick);
            }

            const todayPercent = ((today - minDate) / (maxDate - minDate)) * 100;
            if (todayPercent >= 0 && todayPercent <= 100) {
                const todayLine = document.createElement('div');
                todayLine.className = 'timeline-today';
                todayLine.style.left = todayPercent + '%';
                todayLine.innerHTML = '<div class="timeline-today-label">今天</div>';
                scale.appendChild(todayLine);
            }

            const grouped = {};
            worklogs.forEach(log => {
                const type = log.workType || '其他';
                if (!grouped[type]) grouped[type] = [];
                grouped[type].push(log);
            });

            const tracksContainer = timeline.querySelector('#timelineTracks');
            Object.keys(grouped).forEach(type => {
                const track = document.createElement('div');
                track.className = 'timeline-track';
                track.innerHTML = `
                    <div class="track-label">${type}</div>
                    <div class="track-timeline" data-type="${type}"></div>
                `;
                tracksContainer.appendChild(track);

                const trackTimeline = track.querySelector('.track-timeline');
                const items = [];
                
                grouped[type].forEach(log => {
                    const start = new Date(log.startDate || log.createdAt);
                    const end = new Date(log.endDate || log.startDate || log.createdAt);
                    
                    const leftPercent = ((start - minDate) / (maxDate - minDate)) * 100;
                    const widthPercent = Math.max(5, ((end - start) / (maxDate - minDate)) * 100);
                    
                    if (leftPercent + widthPercent < 0 || leftPercent > 100) return;
                    
                    items.push({
                        log,
                        left: Math.max(0, leftPercent),
                        width: Math.min(100 - Math.max(0, leftPercent), widthPercent),
                        start: leftPercent,
                        end: leftPercent + widthPercent
                    });
                });

                // Detect overlaps and adjust Y position
                items.forEach((item, idx) => {
                    let yOffset = 0;
                    for (let i = 0; i < idx; i++) {
                        const other = items[i];
                        if (!(item.start >= other.end || item.end <= other.start)) {
                            yOffset = Math.max(yOffset, (other.yOffset || 0) + 60);
                        }
                    }
                    item.yOffset = yOffset;
                });

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'timeline-item';
                    div.style.left = item.left + '%';
                    div.style.width = item.width + '%';
                    div.style.top = item.yOffset + 'px';
                    div.style.background = workTypeColors[item.log.workType] || '#95A5A6';
                    
                    div.innerHTML = `
                        <div class="timeline-item-title">${item.log.name}</div>
                        <div class="timeline-item-progress">${item.log.progress}%</div>
                    `;
                    
                    div.onclick = () => showWorklogDetail(item.log.id);
                    trackTimeline.appendChild(div);
                });

                if (items.length > 0) {
                    const maxY = Math.max(...items.map(i => i.yOffset));
                    trackTimeline.style.minHeight = (maxY + 60) + 'px';
                }
            });

            return timeline;
        }

                </div>
            `;

            // 沒有手動圖片但有 URL → 抓 og:image
            if (!plan.image && plan.url) {
                const img = card.querySelector('.plan-og-img');
                const placeholder = card.querySelector('.plan-img-placeholder');
                if (ogImageCache[plan.url]) {
                    img.src = ogImageCache[plan.url];
                    img.style.display = 'block';
                    if (placeholder) placeholder.style.display = 'none';
                } else {
                    fetch(`https://api.microlink.io/?url=${encodeURIComponent(plan.url)}`)
                        .then(r => r.json())
                        .then(data => {
                            const imgUrl = data?.data?.image?.url;
                            if (imgUrl && img) {
                                ogImageCache[plan.url] = imgUrl;
                                img.src = imgUrl;
                                img.style.display = 'block';
                                if (placeholder) placeholder.style.display = 'none';
                            }
                        })
                        .catch(() => {});
                }
            }

            // Drag events
            card.addEventListener('dragstart', (e) => {
                draggedPlanId = plan.id;
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                draggedPlanId = null;
            });

            card.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });

            card.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedPlanId && draggedPlanId !== plan.id) {
                    swapPlanOrder(draggedPlanId, plan.id);
                }
            });

            // Click to view detail
            card.onclick = (e) => {
                if (!e.target.closest('.plan-card-actions')) {
                    if (plan.isPlan) {
                        showPlanDetail(plan.id);
                    } else {
                        showResourceDetail(plan.id);
                    }
                }
            };

            return card;
        }

                                </a>
                            </div>
                        ` : ''}
                        ${resource.description ? `
                            <div style="font-size: 16px; color: var(--text-secondary); margin-bottom: 16px;">${resource.description}</div>
                        ` : ''}
                        ${resource.detailedContent ? `
                            <div class="plan-detail-body">${resource.detailedContent}</div>
                        ` : ''}
                        <div class="plan-detail-actions">
                            <button class="btn" onclick="editResource('${resource.id}'); closeWorklogDetail();" style="background: var(--primary-orange); color: white; border-color: var(--primary-orange);">編輯</button>
                            <button class="btn" onclick="deleteResourceFromDetail('${resource.id}')">刪除</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('worklogDetailModal').classList.add('show');
        }

        function togglePin(id) {
            const resource = resources.find(r => r.id === id);
            resource.pinned = !resource.pinned;
            saveData();
            renderResources();
            showNotification(resource.pinned ? '已置頂' : '已取消置頂');
        }

        function filterByCategory(category, btn) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) {
                btn.classList.add('active');
            } else {
                // Called programmatically (e.g. from show-more): find matching tab
                document.querySelectorAll('.filter-btn').forEach(b => {
                    if (b.getAttribute('onclick')?.includes(`'${category}'`)) b.classList.add('active');
                });
            }
            renderResources();
        }

        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', function() {
                const term = this.value.toLowerCase();
                document.querySelectorAll('.resource-card, .person-card, .worklog-card').forEach(card => {
                    card.style.display = card.textContent.toLowerCase().includes(term) ? 'block' : 'none';
                });
            });
        }

        function openAddModalForCategory(category) {
            currentEditId = null;
            currentAvatarData = null;
            document.getElementById('modalTitle').textContent = `新增${category}`;
            document.getElementById('resourceForm').reset();
            document.getElementById('formCategory').value = category;
            
            // Set default year to 2026
            const today = new Date();
            const defaultDate = `2026-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            if (category === '工作日誌') {
                document.getElementById('formStartDate').value = defaultDate;
            }
            
            toggleFormFields();
            document.getElementById('editModal').classList.add('show');
        }

        function toggleFormFields() {
            const category = document.getElementById('formCategory').value;
            const isPerson = category === '人員管理';
            const isWorklog = category === '工作日誌';
            const isPlan = category === '計畫';
            
            document.getElementById('personFormFields').classList.toggle('hidden', !isPerson);
            document.getElementById('worklogFormFields').classList.toggle('hidden', !isWorklog);
            document.getElementById('planFormFields').classList.toggle('hidden', !isPlan);
            document.getElementById('resourceFormFields').classList.toggle('hidden', isPerson || isWorklog || isPlan);
            
            document.getElementById('formPersonName').required = isPerson;
            document.getElementById('formWorklogTitle').required = isWorklog;
            document.getElementById('formWorkType').required = isWorklog;
            document.getElementById('formStartDate').required = isWorklog;
            document.getElementById('formPlanTitle').required = isPlan;
            document.getElementById('formName').required = !isPerson && !isWorklog && !isPlan;
            document.getElementById('formPriority').required = !isPerson && !isWorklog && !isPlan;
            document.getElementById('formDescription').required = !isPerson && !isWorklog && !isPlan;
        }

        function editResource(id) {
            currentEditId = id;
            const resource = resources.find(r => r.id === id);
            
            document.getElementById('modalTitle').textContent = '編輯';
            document.getElementById('formCategory').value = resource.category;
            toggleFormFields();

            if (resource.isPerson) {
                document.getElementById('formPersonName').value = resource.name || '';
                document.getElementById('formPosition').value = resource.position || '';
                
                // Handle department with "其他" option
                const dept = resource.department || '';
                const deptOptions = ['機械工程系', '車輛工程系', '模具工程系', '電機工程系', '電子工程系', '環境安全系', '造船系'];
                if (dept && !deptOptions.includes(dept) && dept !== '') {
                    document.getElementById('formDepartment').value = '其他';
                    document.getElementById('formDepartmentOther').value = dept;
                    document.getElementById('formDepartmentOther').style.display = 'block';
                } else {
                    document.getElementById('formDepartment').value = dept;
                    document.getElementById('formDepartmentOther').style.display = 'none';
                }
                
                document.getElementById('formGrade').value = resource.grade || '';
                document.getElementById('formJoinDate').value = resource.joinDate || '';
                document.getElementById('formEmail').value = resource.email || '';
                document.getElementById('formPhone').value = resource.phone || '';
                document.getElementById('formSkills').value = resource.skills || '';
                document.getElementById('formOtherInfo').value = resource.otherInfo || '';
                
                // Set checkboxes
                const types = resource.workTypes ? resource.workTypes.split(',').map(t => t.trim()) : [];
                document.querySelectorAll('.work-type-checkbox').forEach(cb => {
                    cb.checked = types.includes(cb.value);
                });
                
                // Update weekday
                updateWeekday('formJoinDate', 'joinWeekday');
                
                if (resource.avatar) {
                    const preview = document.getElementById('avatarPreview');
                    if (resource.avatar.startsWith('data:')) {
                        preview.innerHTML = `<img src="${resource.avatar}">`;
                    } else {
                        preview.textContent = resource.avatar;
                    }
                    currentAvatarData = resource.avatar;
                }
            } else if (resource.isWorklog) {
                document.getElementById('formWorkType').value = resource.workType || '';
                document.getElementById('formWorklogTitle').value = resource.name || '';
                document.getElementById('formProgress').value = resource.progress || 0;
                document.getElementById('formStartDate').value = resource.startDate || '';
                document.getElementById('formEndDate').value = resource.endDate || '';
                document.getElementById('formWorklogNotes').value = resource.notes || '';
                
                updateWeekday('formStartDate', 'startWeekday');
                updateWeekday('formEndDate', 'endWeekday');
            } else if (resource.isPlan) {
                document.getElementById('formPlanTitle').value = resource.name || '';
                document.getElementById('formPlanUrl').value = resource.url || '';
                document.getElementById('formPlanContent').value = resource.content || '';
                document.getElementById('formPlanTag').value = resource.tag || '討論中';
                
                if (resource.image) {
                    currentPlanImageData = resource.image;
                    document.getElementById('planImagePreview').style.display = 'block';
                    document.getElementById('planImagePreviewImg').src = resource.image;
                }
                
                if (resource.url) {
                    document.getElementById('planUrlInput').style.display = 'block';
                }
            } else {
                document.getElementById('formName').value = resource.name;
                document.getElementById('formUrl').value = resource.url || '';
                document.getElementById('formPriority').value = resource.priority;
                document.getElementById('formDescription').value = resource.description;
                document.getElementById('formDetailedContent').value = resource.detailedContent || '';
            }
            
            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditId = null;
            currentAvatarData = null;
            currentPlanImageData = null;
            document.getElementById('avatarPreview').textContent = '👤';
            document.getElementById('emojiPicker').style.display = 'none';
            document.getElementById('planImagePreview').style.display = 'none';
            document.getElementById('planImagePreviewImg').src = '';
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentAvatarData = e.target.result;
                    document.getElementById('avatarPreview').innerHTML = 
                        `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function previewPlanImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPlanImageData = e.target.result;
                    document.getElementById('planImagePreview').style.display = 'block';
                    document.getElementById('planImagePreviewImg').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveResource(event) {
            event.preventDefault();
            
            const category = document.getElementById('formCategory').value;
            const isPerson = category === '人員管理';
            const isWorklog = category === '工作日誌';

            const resource = {
                id: currentEditId || Date.now().toString(),
                category: category,
                pinned: currentEditId ? resources.find(r => r.id === currentEditId)?.pinned || false : false,
                createdAt: currentEditId ? resources.find(r => r.id === currentEditId)?.createdAt : new Date().toISOString()
            };

            if (isPerson) {
                resource.isPerson = true;
                resource.name = document.getElementById('formPersonName').value;
                
                // Get checked work types
                const checkedTypes = Array.from(document.querySelectorAll('.work-type-checkbox:checked'))
                    .map(cb => cb.value);
                resource.workTypes = checkedTypes.join(',');
                
                resource.position = document.getElementById('formPosition').value;
                
                // Handle department with "其他" option
                const deptSelect = document.getElementById('formDepartment').value;
                if (deptSelect === '其他') {
                    resource.department = document.getElementById('formDepartmentOther').value;
                } else {
                    resource.department = deptSelect;
                }
                
                resource.grade = document.getElementById('formGrade').value;
                resource.joinDate = document.getElementById('formJoinDate').value;
                resource.email = document.getElementById('formEmail').value;
                resource.phone = document.getElementById('formPhone').value;
                resource.skills = document.getElementById('formSkills').value;
                resource.otherInfo = document.getElementById('formOtherInfo').value;
                resource.avatar = currentAvatarData || '👤';
                resource.priority = 'medium';
            } else if (isWorklog) {
                resource.isWorklog = true;
                resource.workType = document.getElementById('formWorkType').value;
                resource.name = document.getElementById('formWorklogTitle').value;
                resource.progress = parseInt(document.getElementById('formProgress').value) || 0;
                resource.startDate = document.getElementById('formStartDate').value;
                resource.endDate = document.getElementById('formEndDate').value;
                resource.notes = document.getElementById('formWorklogNotes').value;
                resource.priority = 'medium';
            } else if (category === '計畫') {
                resource.isPlan = true;
                resource.name = document.getElementById('formPlanTitle').value;
                resource.image = currentPlanImageData;
                resource.url = document.getElementById('formPlanUrl').value;
                resource.content = document.getElementById('formPlanContent').value;
                resource.tag = document.getElementById('formPlanTag').value;
                resource.order = currentEditId ? resources.find(r => r.id === currentEditId)?.order || Date.now() : Date.now();
                resource.priority = 'medium';
            } else {
                resource.name = document.getElementById('formName').value;
                resource.url = document.getElementById('formUrl').value;
                resource.priority = document.getElementById('formPriority').value;
                resource.description = document.getElementById('formDescription').value;
                resource.detailedContent = document.getElementById('formDetailedContent').value;
            }

            if (currentEditId) {
                const index = resources.findIndex(r => r.id === currentEditId);
                resources[index] = resource;
            } else {
                resources.push(resource);
            }

            saveData();
            renderResources();
            closeModal();
            showNotification(currentEditId ? '已更新' : '已新增');
        }

        function deleteResource(id) {
            if (confirm('確定要刪除嗎？')) {
                resources = resources.filter(r => r.id !== id);
                saveData();
                renderResources();
                showNotification('已刪除');
            }
        }

        function openCalendar() {
            document.getElementById('calendarContent').innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">行事曆功能開發中...</p>';
            document.getElementById('calendarModal').classList.add('show');
        }

        function closeCalendar() {
            document.getElementById('calendarModal').classList.remove('show');
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
        }

        init();
    </script>
</body>
</html>
